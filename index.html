  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { background: #0D1117; color: #E2E8F0; font-family: 'Inter','Segoe UI',sans-serif; -webkit-font-smoothing: antialiased; }
    ::-webkit-scrollbar { width: 3px; height: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1E293B; border-radius: 2px; }
    button { transition: filter 0.15s; font-family: inherit; cursor: pointer; }
    button:hover { filter: brightness(1.1); }
    input, textarea { outline: none; font-family: inherit; }
    .toggle { position: relative; width: 44px; height: 24px; display: inline-block; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; inset: 0; background: #334155; border-radius: 24px; transition: 0.3s; }
    .slider:before { content: ""; position: absolute; height: 18px; width: 18px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: 0.3s; }
    input:checked + .slider { background: #4F46E5; }
    input:checked + .slider:before { transform: translateX(20px); }
    .photo-card:hover { transform: scale(1.02); }
    .photo-card { transition: transform 0.2s; }
    .photo-card:hover .photo-overlay { opacity: 1 !important; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    @keyframes fadeUp { from{transform:translateY(10px);opacity:0} to{transform:translateY(0);opacity:1} }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes popIn { from{transform:scale(0.9);opacity:0} to{transform:scale(1);opacity:1} }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }
  </style>
</head>

function DropZone({ onUpload, isMobile }) {
  const [dragging, setDragging] = useState(false);
  const ref = useRef();
  const handleFiles = (files) => {
    Array.from(files).filter(f=>f.type.startsWith("image/")).forEach(file=>{
      const r = new FileReader();
      r.onload = e => onUpload({ id:Date.now()+Math.random(), url:e.target.result, etiket:file.name.replace(/\.[^.]+$/,""), kategori:"kaza", tarih:new Date().toLocaleDateString("tr-TR"), yukleyen:"Danışman", boyut:(file.size/1048576).toFixed(1)+" MB" });
      r.readAsDataURL(file);
    });
  };
  return (
    <div onClick={()=>ref.current?.click()} onDragOver={e=>{e.preventDefault();setDragging(true);}} onDragLeave={()=>setDragging(false)} onDrop={e=>{e.preventDefault();setDragging(false);handleFiles(e.dataTransfer.files);}} style={{ border:`2px dashed ${dragging?"#4F46E5":"rgba(79,70,229,0.3)"}`, borderRadius:12, padding:isMobile?"24px 16px":"32px 24px", textAlign:"center", cursor:"pointer", background:dragging?"rgba(79,70,229,0.08)":"rgba(79,70,229,0.03)", transition:"all 0.2s" }}>
      <input ref={ref} type="file" accept="image/*" multiple onChange={e=>handleFiles(e.target.files)} style={{ display:"none" }}/>
      <div style={{ fontSize:isMobile?36:44, marginBottom:10 }}>📷</div>
      <div style={{ fontWeight:700, fontSize:14, color:"#818CF8", marginBottom:6 }}>{isMobile?"Fotoğraf Ekle":"Fotoğraf sürükleyin veya tıklayın"}</div>
      <div style={{ fontSize:11, color:"#475569", marginBottom:14 }}>JPG, PNG, WEBP · Birden fazla seçilebilir</div>
      <button onClick={e=>{e.stopPropagation();ref.current?.click();}} style={{ background:"#4F46E5",border:"none",color:"#fff",borderRadius:9,padding:"10px 24px",fontSize:13,fontWeight:700 }}>📷 Seç</button>
    </div>
  );
}

function Lightbox({ foto, onClose, onPrev, onNext, hasPrev, hasNext }) {
  useEffect(()=>{
    const h=e=>{if(e.key==="Escape")onClose();if(e.key==="ArrowLeft"&&hasPrev)onPrev();if(e.key==="ArrowRight"&&hasNext)onNext();};
    window.addEventListener("keydown",h); return ()=>window.removeEventListener("keydown",h);
  },[hasPrev,hasNext]);
  return (
    <div onClick={onClose} style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16 }}>
      <div onClick={e=>e.stopPropagation()} style={{ position:"relative",maxWidth:900,width:"100%",display:"flex",flexDirection:"column",gap:12 }}>
        <button onClick={onClose} style={{ position:"absolute",top:-44,right:0,background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.15)",color:"#fff",borderRadius:"50%",width:34,height:34,fontSize:20,display:"flex",alignItems:"center",justifyContent:"center" }}>×</button>
        <div style={{ position:"relative",borderRadius:12,overflow:"hidden",background:"#0D1117" }}>
          <img src={foto.url} alt={foto.etiket} style={{ width:"100%",maxHeight:"70vh",objectFit:"contain",display:"block" }}/>
          {hasPrev&&<button onClick={onPrev} style={{ position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",background:"rgba(0,0,0,0.6)",border:"1px solid rgba(255,255,255,0.15)",color:"#fff",borderRadius:"50%",width:40,height:40,fontSize:22,display:"flex",alignItems:"center",justifyContent:"center" }}>‹</button>}
          {hasNext&&<button onClick={onNext} style={{ position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"rgba(0,0,0,0.6)",border:"1px solid rgba(255,255,255,0.15)",color:"#fff",borderRadius:"50%",width:40,height:40,fontSize:22,display:"flex",alignItems:"center",justifyContent:"center" }}>›</button>}
        </div>
        <div style={{ background:"#161B26",border:"1px solid rgba(255,255,255,0.08)",borderRadius:10,padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8 }}>
          <div><div style={{ fontWeight:700,fontSize:14 }}>{foto.etiket}</div><div style={{ fontSize:12,color:"#64748B",marginTop:2 }}>{foto.tarih} · {foto.yukleyen} · {foto.boyut}</div></div>
          <a href={foto.url} download={`${foto.etiket}.jpg`} style={{ background:"rgba(79,70,229,0.15)",border:"1px solid rgba(79,70,229,0.3)",color:"#818CF8",borderRadius:6,padding:"5px 13px",fontSize:11,fontWeight:700,textDecoration:"none" }}>⬇ İndir</a>
        </div>
      </div>
    </div>
  );
}

            <div style={{ width:40,height:40,borderRadius:10,background:"rgba(79,70,229,0.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20 }}>🛡️</div>
            <div><div style={{ fontWeight:700,fontSize:14 }}>Danışman Hesabı</div><div style={{ fontSize:12,color:"#64748B" }}>Tam yetkili erişim</div></div>

          <div style={{ display:"flex",flexDirection:"column",gap:8 }}>
            {["Tüm hasar dosyaları","Evrak yönetimi","Fotoğraf yükleme","SMS bildirimleri","Taraf iletişimi"].map(y=>(

function AcenteGiris({ onGiris, onGeri }) {
  const [kadi, setKadi] = useState("");
  const [sifre, setSifre] = useState("");
  const [hata, setHata] = useState(false);
  const [yukleniyor, setYukleniyor] = useState(false);

  const giris = () => {
    setYukleniyor(true); setHata(false);
    setTimeout(() => {
      setYukleniyor(false);
      if (kadi === "acente" && sifre === "acente2024") onGiris();
      else { setHata(true); setSifre(""); }
    }, 800);
  };

  return (
    <div style={{ minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:24,background:"#0D1117" }}>
      <div style={{ width:"100%",maxWidth:380,animation:"popIn 0.3s ease" }}>
        <button onClick={onGeri} style={{ background:"none",border:"none",color:"#64748B",fontSize:13,cursor:"pointer",marginBottom:24,display:"flex",alignItems:"center",gap:6 }}>← Geri</button>
        <div style={{ textAlign:"center",marginBottom:32 }}>
          <div style={{ width:56,height:56,borderRadius:14,background:"rgba(59,130,246,0.12)",border:"1px solid rgba(59,130,246,0.3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,margin:"0 auto 14px" }}>🏢</div>
          <div style={{ fontWeight:800,fontSize:20 }}>Sigorta Acentesi Girişi</div>
          <div style={{ fontSize:13,color:"#64748B",marginTop:6 }}>Acente kullanıcı adı ve şifrenizle girin</div>
        </div>
        <div style={{ display:"flex",flexDirection:"column",gap:14 }}>
          <div>
            <div style={{ fontSize:11,color:"#64748B",fontWeight:600,marginBottom:6 }}>KULLANICI ADI</div>
            <input type="text" value={kadi} onChange={e=>setKadi(e.target.value)} onKeyDown={e=>e.key==="Enter"&&giris()} placeholder="Kullanıcı adı" style={{ width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,color:"#E2E8F0",padding:"12px 14px",fontSize:14 }}/>
          </div>
          <div>
            <div style={{ fontSize:11,color:"#64748B",fontWeight:600,marginBottom:6 }}>ŞİFRE</div>
            <input type="password" value={sifre} onChange={e=>setSifre(e.target.value)} onKeyDown={e=>e.key==="Enter"&&giris()} placeholder="Şifrenizi girin" style={{ width:"100%",background:hata?"rgba(239,68,68,0.08)":"rgba(255,255,255,0.05)",border:`1px solid ${hata?"rgba(239,68,68,0.5)":"rgba(255,255,255,0.1)"}`,borderRadius:10,color:"#E2E8F0",padding:"12px 14px",fontSize:14,animation:hata?"shake 0.3s ease":"none" }}/>
            {hata&&<div style={{ fontSize:11,color:"#EF4444",marginTop:6 }}>⚠ Kullanıcı adı veya şifre hatalı.</div>}
          </div>
          <button onClick={giris} disabled={yukleniyor} style={{ background:"#3B82F6",border:"none",color:"#fff",borderRadius:10,padding:"14px",fontSize:14,fontWeight:700,marginTop:4 }}>
            {yukleniyor?<span style={{ animation:"pulse 0.8s infinite" }}>Giriş yapılıyor...</span>:"Giriş Yap →"}
          </button>
        </div>
        <div style={{ marginTop:20,padding:"12px 14px",background:"rgba(59,130,246,0.08)",border:"1px solid rgba(59,130,246,0.2)",borderRadius:8,fontSize:11,color:"#60A5FA" }}>
          💡 Demo: Kullanıcı adı: <strong>acente</strong> · Şifre: <strong>acente2024</strong>
        </div>
      </div>
    </div>
  );
}

function MusteriGiris({ onGiris, onGeri }) {
  const [adim, setAdim] = useState("tc"); // "tc" | "sms"
  const [tc, setTc] = useState("");
  const [smsKod, setSmsKod] = useState("");
  const [hata, setHata] = useState("");
  const [yukleniyor, setYukleniyor] = useState(false);
  const [gonderildi, setGonderildi] = useState(false);
  const [sayac, setSayac] = useState(0);

  useEffect(()=>{
    if (sayac > 0) { const t = setTimeout(()=>setSayac(s=>s-1),1000); return ()=>clearTimeout(t); }
  },[sayac]);

  const tcGonder = () => {
    if (tc.replace(/\s/g,"").length < 11) { setHata("TC kimlik numarası 11 haneli olmalıdır."); return; }
    if (tc.replace(/\s/g,"") !== DOSYA.sahip.tc.replace(/\s/g,"")) { setHata("Bu TC kimlik numarasına ait kayıt bulunamadı."); return; }
    setYukleniyor(true); setHata("");
    setTimeout(()=>{ setYukleniyor(false); setAdim("sms"); setGonderildi(true); setSayac(60); },1000);
  };

  const smsDogrula = () => {
    if (smsKod.length < 4) { setHata("Lütfen 4 haneli kodu girin."); return; }
    setYukleniyor(true); setHata("");
    setTimeout(()=>{
      setYukleniyor(false);
      if (smsKod === "1234") onGiris();
      else { setHata("Kod hatalı. Demo kod: 1234"); setSmsKod(""); }
    },800);
  };

  const telefMask = DOSYA.sahip.telefon.replace(/(\d{4})\s(\d{3})\s(\d{2})\s(\d{2})/, (m,a,b,c,d)=>`${a} *** ** ${d}`);

  return (
    <div style={{ minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:24,background:"#0D1117" }}>
      <div style={{ width:"100%",maxWidth:380,animation:"popIn 0.3s ease" }}>
        <button onClick={onGeri} style={{ background:"none",border:"none",color:"#64748B",fontSize:13,cursor:"pointer",marginBottom:24,display:"flex",alignItems:"center",gap:6 }}>← Geri</button>
        <div style={{ textAlign:"center",marginBottom:32 }}>
          <div style={{ width:56,height:56,borderRadius:14,background:"rgba(245,158,11,0.12)",border:"1px solid rgba(245,158,11,0.3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,margin:"0 auto 14px" }}>👤</div>
          <div style={{ fontWeight:800,fontSize:20 }}>Sigortalı Girişi</div>
          <div style={{ fontSize:13,color:"#64748B",marginTop:6 }}>Aracınızın durumunu görüntüleyin</div>
        </div>

        {/* Adım göstergesi */}
        <div style={{ display:"flex",gap:8,marginBottom:28 }}>
          {["TC Kimlik","SMS Doğrulama"].map((s,i)=>(
            <div key={i} style={{ flex:1,textAlign:"center" }}>
              <div style={{ height:3,borderRadius:2,background:(adim==="tc"&&i===0)||(adim==="sms"&&i<=1)?"#F59E0B":"rgba(255,255,255,0.1)",marginBottom:6 }}/>
              <div style={{ fontSize:10,color:(adim==="tc"&&i===0)||(adim==="sms"&&i<=1)?"#F59E0B":"#475569",fontWeight:600 }}>{s}</div>
            </div>
          ))}
        </div>

        {adim === "tc" && (
          <div style={{ display:"flex",flexDirection:"column",gap:14 }}>
            <div>
              <div style={{ fontSize:11,color:"#64748B",fontWeight:600,marginBottom:6 }}>TC KİMLİK NUMARASI</div>
              <input type="tel" value={tc} onChange={e=>setTc(e.target.value.replace(/\D/g,"").slice(0,11))} onKeyDown={e=>e.key==="Enter"&&tcGonder()} placeholder="12345678901" maxLength={11} style={{ width:"100%",background:"rgba(255,255,255,0.05)",border:`1px solid ${hata?"rgba(239,68,68,0.5)":"rgba(255,255,255,0.1)"}`,borderRadius:10,color:"#E2E8F0",padding:"12px 14px",fontSize:16,letterSpacing:"2px",fontFamily:"'JetBrains Mono',monospace" }}/>
              {hata&&<div style={{ fontSize:11,color:"#EF4444",marginTop:6 }}>⚠ {hata}</div>}
            </div>
            <button onClick={tcGonder} disabled={yukleniyor} style={{ background:"#F59E0B",border:"none",color:"#000",borderRadius:10,padding:"14px",fontSize:14,fontWeight:800,marginTop:4 }}>
              {yukleniyor?<span style={{ animation:"pulse 0.8s infinite" }}>Gönderiliyor...</span>:"SMS Kodu Gönder →"}
            </button>
          </div>
        )}

        {adim === "sms" && (
          <div style={{ display:"flex",flexDirection:"column",gap:14 }}>
            <div style={{ padding:"14px",background:"rgba(245,158,11,0.08)",border:"1px solid rgba(245,158,11,0.2)",borderRadius:10,fontSize:13,color:"#94A3B8",lineHeight:1.6,textAlign:"center" }}>
              📱 <strong style={{ color:"#F59E0B" }}>{telefMask}</strong> numaralı telefona SMS kodu gönderildi
            </div>
            <div>
              <div style={{ fontSize:11,color:"#64748B",fontWeight:600,marginBottom:6 }}>4 HANELİ KOD</div>
              <input type="tel" value={smsKod} onChange={e=>setSmsKod(e.target.value.replace(/\D/g,"").slice(0,4))} onKeyDown={e=>e.key==="Enter"&&smsDogrula()} placeholder="· · · ·" maxLength={4} style={{ width:"100%",background:"rgba(255,255,255,0.05)",border:`1px solid ${hata?"rgba(239,68,68,0.5)":"rgba(255,255,255,0.1)"}`,borderRadius:10,color:"#E2E8F0",padding:"14px",fontSize:28,letterSpacing:"12px",textAlign:"center",fontFamily:"'JetBrains Mono',monospace" }}/>
              {hata&&<div style={{ fontSize:11,color:"#EF4444",marginTop:6,textAlign:"center" }}>⚠ {hata}</div>}
            </div>
            <button onClick={smsDogrula} disabled={yukleniyor||smsKod.length<4} style={{ background:smsKod.length===4?"#F59E0B":"rgba(245,158,11,0.3)",border:"none",color:smsKod.length===4?"#000":"#64748B",borderRadius:10,padding:"14px",fontSize:14,fontWeight:800 }}>
              {yukleniyor?<span style={{ animation:"pulse 0.8s infinite" }}>Doğrulanıyor...</span>:"Giriş Yap →"}
            </button>
            <div style={{ textAlign:"center",fontSize:12,color:"#475569" }}>
              {sayac>0?<span>Kod yeniden göndermek için <strong style={{ color:"#F59E0B" }}>{sayac}s</strong> bekleyin</span>:<button onClick={()=>{setSayac(60);}} style={{ background:"none",border:"none",color:"#F59E0B",fontSize:12,cursor:"pointer",textDecoration:"underline" }}>Kodu tekrar gönder</button>}
            </div>
          </div>
        )}

        <div style={{ marginTop:20,padding:"12px 14px",background:"rgba(245,158,11,0.08)",border:"1px solid rgba(245,158,11,0.2)",borderRadius:8,fontSize:11,color:"#F59E0B" }}>
          💡 Demo TC: <strong>12345678901</strong> · SMS kodu: <strong>1234</strong>
        </div>
      </div>
    </div>
  );
}

// MÜŞTERİ PANELİ

function MusteriPanel({ onCikis }) {
  const aktifAdim = DOSYA.onarimAdimlari.find(a=>a.durum==="aktif");
  const tamamlandi = DOSYA.onarimAdimlari.filter(a=>a.durum==="tamamlandi").length;
  const oP = Math.round((tamamlandi/DOSYA.onarimAdimlari.length)*100);
  const [isMobile, setIsMobile] = useState(false);
  useEffect(()=>{ const c=()=>setIsMobile(window.innerWidth<768); c(); window.addEventListener("resize",c); return()=>window.removeEventListener("resize",c); },[]);

  const ADIM_RENKLERI = { tamamlandi:"#10B981", aktif:"#4F46E5", bekliyor:"#334155" };

  return (
    <div style={{ fontFamily:"'Inter',sans-serif", background:"#0D1117", minHeight:"100vh", color:"#E2E8F0" }}>
      {/* Header */}
      <div style={{ background:"#111827", borderBottom:"1px solid rgba(255,255,255,0.07)", padding:`0 ${isMobile?12:24}px`, height:isMobile?52:56, display:"flex", alignItems:"center", justifyContent:"space-between", position:"sticky", top:0, zIndex:50 }}>
        <div style={{ display:"flex", alignItems:"center", gap:12 }}>
          <div style={{ width:32,height:32,borderRadius:8,background:"linear-gradient(135deg,#92400E,#F59E0B)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16 }}>👤</div>
          <div>
            <div style={{ fontWeight:800,fontSize:14 }}>HasarTrack</div>
            <div style={{ fontSize:10,color:"#475569" }}>Sigortalı Portalı</div>
          </div>
        </div>
        <div style={{ display:"flex",alignItems:"center",gap:10 }}>
          <div style={{ fontSize:12,color:"#64748B",display:isMobile?"none":"block" }}>{DOSYA.sahip.ad}</div>
          <button onClick={onCikis} style={{ background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.2)",color:"#EF4444",borderRadius:7,padding:"5px 12px",fontSize:11,fontWeight:700 }}>Çıkış</button>
        </div>
      </div>

      <div style={{ padding:isMobile?"12px":"24px",maxWidth:640,margin:"0 auto",display:"flex",flexDirection:"column",gap:16 }}>

        {/* Hoşgeldin */}
        <div style={{ background:"linear-gradient(135deg,rgba(245,158,11,0.1),rgba(245,158,11,0.03))", border:"1px solid rgba(245,158,11,0.2)", borderRadius:16, padding:"20px 20px" }}>
          <div style={{ fontSize:11,color:"#F59E0B",fontWeight:700,letterSpacing:"0.5px",marginBottom:6 }}>HOŞ GELDİNİZ</div>
          <div style={{ fontWeight:800,fontSize:isMobile?18:22,marginBottom:4 }}>Merhaba, {DOSYA.sahip.ad.split(" ")[0]} Bey 👋</div>
          <div style={{ fontSize:13,color:"#94A3B8",marginBottom:14 }}>Aracınızın hasar dosyası aktif olarak takip edilmektedir.</div>
          <div style={{ display:"flex",gap:8,flexWrap:"wrap" }}>
            <Chip renk="#F59E0B">{DOSYA.arac.plaka}</Chip>
            <Chip renk="#64748B">{DOSYA.id}</Chip>
            <Chip renk="#10B981">● Aktif</Chip>
          </div>
        </div>

        {/* Mevcut Durum */}
        <Card style={{ background:"rgba(79,70,229,0.07)",border:"1px solid rgba(79,70,229,0.22)" }}>
          <div style={{ fontSize:11,color:"#818CF8",fontWeight:800,letterSpacing:"0.8px",marginBottom:8 }}>⬤ MEVCUT DURUM</div>
          <div style={{ fontWeight:800,fontSize:isMobile?18:22,marginBottom:6 }}>{aktifAdim?.ad}</div>
          <div style={{ fontSize:13,color:"#94A3B8",lineHeight:1.6,marginBottom:16 }}>{aktifAdim?.not}</div>
          <div style={{ marginBottom:8 }}>
            <div style={{ display:"flex",justifyContent:"space-between",marginBottom:6 }}>
              <span style={{ fontSize:12,color:"#64748B" }}>İlerleme</span>
              <span style={{ fontSize:12,fontFamily:"'JetBrains Mono',monospace",color:"#818CF8" }}>%{oP}</span>
            </div>
            <div style={{ height:8,background:"rgba(255,255,255,0.06)",borderRadius:4 }}>
              <div style={{ height:"100%",width:`${oP}%`,borderRadius:4,background:"linear-gradient(90deg,#4F46E5,#7C3AED)",boxShadow:"0 0 8px rgba(79,70,229,0.4)" }}/>
            </div>
          </div>
          <div style={{ fontSize:12,color:"#64748B" }}>{tamamlandi} / {DOSYA.onarimAdimlari.length} adım tamamlandı</div>
        </Card>

        {/* Adım listesi — sadece tamamlananlar ve aktif adım */}
        <Card>
          <SecTitle>📋 Süreç Adımları</SecTitle>
          <div style={{ display:"flex",flexDirection:"column",gap:0 }}>
            {DOSYA.onarimAdimlari.map((a,i)=>(
              <div key={a.id} style={{ display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:i<DOSYA.onarimAdimlari.length-1?"1px solid rgba(255,255,255,0.04)":"none", opacity:a.durum==="bekliyor"?0.4:1 }}>
                <div style={{ width:28,height:28,borderRadius:"50%",flexShrink:0, background:a.durum==="tamamlandi"?"#10B981":a.durum==="aktif"?"rgba(79,70,229,0.25)":"rgba(255,255,255,0.04)", border:a.durum==="aktif"?"2px solid #4F46E5":"none", display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800,color:"#fff" }}>
                  {a.durum==="tamamlandi"?"✓":a.durum==="aktif"?"●":i+1}
                </div>
                <span style={{ flex:1,fontSize:13,fontWeight:a.durum==="aktif"?700:400, color:a.durum==="bekliyor"?"#475569":a.durum==="aktif"?"#818CF8":"#CBD5E1" }}>{a.ad}</span>
                {a.durum==="aktif"&&<Chip renk="#4F46E5" sm>Şu an burada</Chip>}
                {a.durum==="tamamlandi"&&<Chip renk="#10B981" sm>✓</Chip>}
              </div>
            ))}
          </div>
        </Card>

        <div style={{ textAlign:"center",fontSize:11,color:"#334155",paddingBottom:24 }}>
          Hasar danışmanınız: <strong style={{ color:"#64748B" }}>HasarTrack · {DOSYA.id}</strong>
        </div>
      </div>
    </div>
  );
}

// SİGORTA ACENTESİ PANELİ

function AcentePanel({ onCikis }) {
  const [tab, setTab] = useState("ozet");
  const [isMobile, setIsMobile] = useState(false);

              <div style={{ overflow:"auto",padding:"14px 16px",display:"flex",flexDirection:"column",gap:10,maxHeight:360 }}>
                {mesajlar.map(m=>{ const benden=m.gonderen==="Danışman"; const gc=TC_CONFIG[m.gonderen]||TC_CONFIG["Danışman"]; const hc=TC_CONFIG[m.hedef]||TC_CONFIG["Danışman"]; return (
                  <div key={m.id} style={{ display:"flex",flexDirection:"column",alignItems:benden?"flex-end":"flex-start" }}>
                    <div style={{ display:"flex",gap:5,marginBottom:4,alignItems:"center",flexWrap:"wrap",justifyContent:benden?"flex-end":"flex-start" }}>
                      <span style={{ fontSize:11,fontWeight:700,color:gc.renk }}>{gc.icon} {m.gonderen}</span>
                      <span style={{ color:"#334155" }}>→</span>
                      <span style={{ fontSize:11,fontWeight:700,color:hc.renk }}>{hc.icon} {m.hedef}</span>
                      <span style={{ fontSize:10,color:"#475569",fontFamily:"'JetBrains Mono',monospace" }}>{m.tarih}</span>
                    </div>
                    <div style={{ maxWidth:"82%",padding:"10px 13px",borderRadius:10,background:benden?"rgba(79,70,229,0.18)":"rgba(255,255,255,0.04)",border:`1px solid ${benden?"rgba(79,70,229,0.28)":"rgba(255,255,255,0.07)"}`,fontSize:13,color:"#CBD5E1",lineHeight:1.6 }}>{m.mesaj}</div>
                  </div>
                );})}
              </div>
              <div style={{ padding:"12px 16px",borderTop:"1px solid rgba(255,255,255,0.06)" }}>
                <div style={{ display:"flex",gap:6,marginBottom:10,flexWrap:"wrap" }}>
                  {Object.keys(TC_CONFIG).filter(k=>k!=="Danışman").map(t=>(
                    <button key={t} onClick={()=>setHedef(t)} style={{ padding:"5px 10px",borderRadius:6,border:"none",background:hedef===t?`${TC_CONFIG[t].renk}20`:"rgba(255,255,255,0.04)",color:hedef===t?TC_CONFIG[t].renk:"#64748B",fontSize:11,fontWeight:600,cursor:"pointer",borderWidth:1,borderStyle:"solid",borderColor:hedef===t?`${TC_CONFIG[t].renk}35`:"rgba(255,255,255,0.07)" }}>{TC_CONFIG[t].icon} {isMobile?"":t}</button>
                  ))}
                </div>
                <div style={{ display:"flex",gap:8 }}>
                  <textarea value={mesajMetin} onChange={e=>setMesajMetin(e.target.value)} onKeyDown={e=>{ if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); gonder(); }}} placeholder={`${hedef}'e mesaj...`} style={{ flex:1,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,color:"#E2E8F0",padding:"10px 12px",fontSize:13,resize:"none",minHeight:44,maxHeight:90 }}/>
                  <button onClick={gonder} style={{ background:"#4F46E5",border:"none",color:"#fff",borderRadius:8,padding:"0 16px",fontSize:18,flexShrink:0 }}>→</button>
                </div>
              </div>
            </Card>
          </div>
        )}

        {tab==="sms"&&(
          <div style={{ display:"flex",flexDirection:"column",gap:14 }}>
            <Card>
              <SecTitle>📱 Otomatik SMS Ayarları</SecTitle>
              <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",padding:"13px 14px",background:smsAktif?"rgba(79,70,229,0.07)":"rgba(255,255,255,0.02)",border:`1px solid ${smsAktif?"rgba(79,70,229,0.25)":"rgba(255,255,255,0.07)"}`,borderRadius:10,marginBottom:14 }}>
                <div><div style={{ fontWeight:700,fontSize:13,marginBottom:2 }}>Günlük SMS Bildirimi</div><div style={{ fontSize:11,color:"#64748B" }}>Araç sahibine otomatik durum SMS'i</div></div>
                <label className="toggle"><input type="checkbox" checked={smsAktif} onChange={e=>setSmsAktif(e.target.checked)}/><span className="slider"></span></label>
              </div>
              <div style={{ padding:"11px 13px",background:"rgba(245,158,11,0.06)",border:"1px solid rgba(245,158,11,0.18)",borderRadius:9,marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center" }}>
                <div><div style={{ fontSize:10,color:"#F59E0B",fontWeight:700,marginBottom:2 }}>ALICI</div><div style={{ fontWeight:700,fontSize:13 }}>{DOSYA.sahip.ad}</div><div style={{ fontSize:12,color:"#94A3B8",fontFamily:"'JetBrains Mono',monospace" }}>{DOSYA.sahip.telefon}</div></div>
                <Chip renk="#F59E0B">📱 SMS</Chip>
              </div>
              <div style={{ marginBottom:16 }}>
                <div style={{ fontSize:11,color:"#64748B",fontWeight:600,marginBottom:10 }}>GÖNDERIM SAATİ</div>
                <div style={{ display:"flex",gap:8,flexWrap:"wrap" }}>
                  {["08:00","09:00","10:00","11:00","14:00","17:00"].map(s=>(
                    <button key={s} onClick={()=>setSmsSaati(s)} style={{ padding:"8px 14px",borderRadius:7,border:"none",background:smsSaati===s?"rgba(79,70,229,0.25)":"rgba(255,255,255,0.04)",color:smsSaati===s?"#818CF8":"#64748B",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace",borderWidth:1,borderStyle:"solid",borderColor:smsSaati===s?"rgba(79,70,229,0.4)":"rgba(255,255,255,0.08)" }}>{s}</button>
                  ))}
                </div>
              </div>
              <div style={{ background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:8,padding:12,fontSize:12,color:"#94A3B8",lineHeight:1.7,marginBottom:14 }}>{otomatikMesaj}</div>
              <div style={{ display:"flex",gap:8 }}>
                <button onClick={smsGonder} disabled={smsGonderiliyor||!smsAktif} style={{ flex:1,background:smsGonderildi?"#10B981":smsGonderiliyor?"rgba(79,70,229,0.4)":"#4F46E5",border:"none",color:"#fff",borderRadius:9,padding:"13px",fontSize:13,fontWeight:700,cursor:smsGonderiliyor||!smsAktif?"not-allowed":"pointer" }}>
                  {smsGonderiliyor?<span style={{ animation:"pulse 0.8s infinite" }}>⏳ Gönderiliyor...</span>:smsGonderildi?"✓ İletildi!":"📤 Şimdi Gönder"}
                </button>
              </div>
            </Card>
            <Card>
              <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14 }}>
                <div style={{ fontWeight:700,fontSize:13 }}>📜 SMS Geçmişi</div>
                <Chip renk="#4F46E5">{smsMesajlar.filter(m=>m.durum==="iletildi").length} iletildi</Chip>
              </div>
              {smsMesajlar.map(sms=>{ const sb=SMS_SABLONLARI[sms.sablon]; return (
                <div key={sms.id} style={{ padding:"11px 13px",background:sms.durum==="iletildi"?"rgba(16,185,129,0.04)":"rgba(245,158,11,0.05)",border:`1px solid ${sms.durum==="iletildi"?"rgba(16,185,129,0.15)":"rgba(245,158,11,0.2)"}`,borderRadius:9,marginBottom:8 }}>
                  <div style={{ display:"flex",justifyContent:"space-between",marginBottom:4 }}>
                    <div style={{ display:"flex",gap:8,alignItems:"center" }}>
                      <span style={{ fontSize:14 }}>{sb?.ikon||"📱"}</span>
                      <div><div style={{ fontWeight:700,fontSize:12,color:sb?.renk||"#94A3B8" }}>{sb?.baslik}</div><div style={{ fontSize:10,color:"#475569",fontFamily:"'JetBrains Mono',monospace" }}>{sms.tarih} · {sms.saat}</div></div>
                    </div>
                    <Chip renk={sms.durum==="iletildi"?"#10B981":"#F59E0B"} sm>{sms.durum==="iletildi"?"✓ İletildi":"⏳ Bekliyor"}</Chip>
                  </div>
                </div>
              );})}
            </Card>
          </div>
        )}
      </div>

      {/* Mobil nav */}
      {isMobile&&(
        <div style={{ position:"fixed",bottom:0,left:0,right:0,background:"#111827",borderTop:"1px solid rgba(255,255,255,0.08)",display:"flex",zIndex:100,paddingBottom:"env(safe-area-inset-bottom)" }}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{ flex:1,background:"none",border:"none",padding:"8px 2px 10px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,position:"relative" }}>
              <span style={{ fontSize:18 }}>{t.mIcon}</span>
              <span style={{ fontSize:8,fontWeight:tab===t.id?700:500,color:tab===t.id?"#818CF8":"#475569" }}>{t.label}</span>
              {tab===t.id&&<div style={{ position:"absolute",top:0,left:"20%",right:"20%",height:2,background:"#4F46E5",borderRadius:"0 0 2px 2px" }}/>}
              {t.badge&&eksik.length>0&&<div style={{ position:"absolute",top:5,right:"calc(50% - 16px)",background:"#EF4444",color:"#fff",borderRadius:"50%",width:13,height:13,fontSize:7,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center" }}>{eksik.length}</div>}
              {t.photoBadge&&photos.length>0&&<div style={{ position:"absolute",top:5,right:"calc(50% - 20px)",background:"#3B82F6",color:"#fff",borderRadius:3,padding:"0 3px",fontSize:7,fontWeight:800 }}>{photos.length}</div>}
            </button>
          ))}
        </div>
      )}

      {lightboxFoto&&(
        <Lightbox foto={lightboxFoto} onClose={()=>setLightboxFoto(null)} onPrev={()=>setLightboxFoto(filtreliPhotos[lbIdx-1])} onNext={()=>setLightboxFoto(filtreliPhotos[lbIdx+1])} hasPrev={lbIdx>0} hasNext={lbIdx<filtreliPhotos.length-1}/>
      )}
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
// ANA UYGULAMA — ROUTER
// ════════════════════════════════════════════════════════════════
function App() {
  const [ekran, setEkran] = useState("rolsecim"); // rolsecim | danisman-giris | acente-giris | musteri-giris | danisman | acente | musteri

  return (
    <>
      {ekran==="rolsecim" && <RolSecim onRol={r=>setEkran(`${r}-giris`)}/>}
      {ekran==="danisman-giris" && <DanismanGiris onGiris={()=>setEkran("danisman")} onGeri={()=>setEkran("rolsecim")}/>}
      {ekran==="acente-giris"   && <AcenteGiris   onGiris={()=>setEkran("acente")}   onGeri={()=>setEkran("rolsecim")}/>}
      {ekran==="musteri-giris"  && <MusteriGiris  onGiris={()=>setEkran("musteri")}  onGeri={()=>setEkran("rolsecim")}/>}
      {ekran==="danisman" && <DanismanPanel onCikis={()=>setEkran("rolsecim")}/>}
      {ekran==="acente"   && <AcentePanel   onCikis={()=>setEkran("rolsecim")}/>}
      {ekran==="musteri"  && <MusteriPanel  onCikis={()=>setEkran("rolsecim")}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
