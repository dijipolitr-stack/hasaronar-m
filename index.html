<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%}
body{background:#0D1117;color:#E2E8F0;font-family:'Inter','Segoe UI',sans-serif;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#1E293B;border-radius:2px}
button{transition:filter .15s;font-family:inherit;cursor:pointer}
button:hover{filter:brightness(1.1)}
input,textarea,select{outline:none;font-family:inherit}
.toggle{position:relative;width:44px;height:24px;display:inline-block}
.toggle input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;inset:0;background:#334155;border-radius:24px;transition:.3s}
.slider:before{content:"";position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
input:checked+.slider{background:#4F46E5}
input:checked+.slider:before{transform:translateX(20px)}
.photo-card:hover{transform:scale(1.02)}.photo-card{transition:transform .2s}
.photo-card:hover .photo-overlay{opacity:1!important}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes fadeUp{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes popIn{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
</style>

function Chip({renk,children,sm}){
  return <span style={{fontSize:sm?9:10,fontWeight:700,padding:sm?"2px 6px":"2px 8px",borderRadius:4,background:`${renk}18`,color:renk,border:`1px solid ${renk}30`,whiteSpace:"nowrap"}}>{children}</span>;
}
function Card({children,style={}}){
  return <div style={{background:"#161B26",border:"1px solid rgba(255,255,255,0.06)",borderRadius:12,padding:16,...style}}>{children}</div>;
}
function ST({children}){return <div style={{fontWeight:700,fontSize:13,marginBottom:14}}>{children}</div>;}

function KaynakChip({kaynak}){
  const m={acente:{l:"Acente",c:"#3B82F6"},servis:{l:"Servis",c:"#8B5CF6"},musteri:{l:"Müşteri",c:"#F59E0B"},eksper:{l:"Eksper",c:"#10B981"}};
  const k=m[kaynak];if(!k)return null;
  return <span style={{fontSize:8,fontWeight:700,padding:"1px 5px",borderRadius:3,background:`${k.c}15`,color:k.c,border:`1px solid ${k.c}25`,marginLeft:4}}>{k.l}</span>;
}

}

function OnarimTimeline({adimlar,onTamamla,readonly}){

    <div>
      {adimlar.map((a,i)=>(

          <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
            <div style={{width:24,height:24,borderRadius:"50%",flexShrink:0,background:a.durum==="tamamlandi"?"#10B981":a.durum==="aktif"?"rgba(79,70,229,0.25)":"rgba(255,255,255,0.04)",border:a.durum==="aktif"?"2px solid #4F46E5":a.durum==="bekliyor"?"2px solid rgba(255,255,255,0.08)":"none",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,color:"#fff"}}>
              {a.durum==="tamamlandi"?"✓":a.durum==="aktif"?<div style={{width:7,height:7,borderRadius:"50%",background:"#4F46E5"}}/>:<div style={{width:5,height:5,borderRadius:"50%",background:"#334155"}}/>}
            </div>
            {i<adimlar.length-1&&<div style={{width:2,flex:1,minHeight:20,background:a.durum==="tamamlandi"?"#10B98125":"rgba(255,255,255,0.04)"}}/>}
          </div>
          <div style={{paddingBottom:16,flex:1,paddingTop:2}}>
            <div style={{display:"flex",justifyContent:"space-between",gap:8,marginBottom:2}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontSize:13,fontWeight:a.durum==="aktif"?700:500,color:a.durum==="bekliyor"?"#475569":a.durum==="aktif"?"#818CF8":"#E2E8F0"}}>{a.ad}</span>

                {a.tarih&&<span style={{fontSize:10,color:"#64748B",fontFamily:"'JetBrains Mono',monospace"}}>{a.tarih}</span>}
                {!readonly&&a.durum!=="tamamlandi"&&<button onClick={()=>onTamamla(a.id)} style={{background:"rgba(16,185,129,0.12)",border:"1px solid rgba(16,185,129,0.25)",color:"#10B981",borderRadius:5,padding:"2px 8px",fontSize:9,fontWeight:700}}>Tamamla</button>}

    </div>
  );
}

// ─── YENİ DOSYA SİHİRBAZI ─────────────────────────────────────────────────
function YeniDosyaWizard({onKapat,onKaydet}){
  const [adim,setAdim]=useState(1);
  const [ruhsatImg,setRuhsatImg]=useState(null);
  const [tarama,setTarama]=useState(false);
  const [taramaOk,setTaramaOk]=useState(false);
  const [taramaHata,setTaramaHata]=useState(false);
  const [belgeler,setBelgeler]=useState([]);
  const [fotograflar,setFotograflar]=useState([]);
  const [kayitOk,setKayitOk]=useState(false);
  const [isMobile,setIsMobile]=useState(false);
  const ruhsatRef=useRef();
  const belgeRef=useRef();
  const fotoRef=useRef();
  useEffect(()=>{const c=()=>setIsMobile(window.innerWidth<768);c();window.addEventListener("resize",c);return()=>window.removeEventListener("resize",c);},[]);

  const [form,setForm]=useState({
    plaka:"",saseNo:"",motorNo:"",marka:"",model:"",yil:"",ruhsatSeriNo:"",renk:"",
    sahipAd:"",tc:"",telefon:"",email:"",
    acente:"",sigortaSirketi:"",bransi:"",muallakHasar:"",policeNo:"",hasarNo:"",teminat:"",muafiyet:"",
    kazaTarihi:"",kazaAciklama:"",
  });
  const sf=(k,v)=>setForm(p=>({...p,[k]:v}));

  const ruhsatTara=async()=>{
    if(!ruhsatImg)return;
    setTarama(true);setTaramaHata(false);setTaramaOk(false);
    try{
      const resp=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:800,
          messages:[{role:"user",content:[
            {type:"image",source:{type:"base64",media_type:"image/jpeg",data:ruhsatImg.split(",")[1]}},
            {type:"text",text:'Bu bir Türk araç tescil belgesi veya ruhsatıdır. Görseldeki bilgileri bu JSON formatında döndür, bulunamayan alanlar için boş string kullan, sadece JSON döndür: {"plaka":"","saseNo":"","motorNo":"","marka":"","model":"","yil":"","ruhsatSeriNo":"","sahipAd":"","sahipSoyad":"","tcVeyaVergiNo":"","renk":""}'}
          ]}]
        })
      });
      const data=await resp.json();
      const text=data.content?.find(b=>b.type==="text")?.text||"";
      const clean=text.replace(/```json|```/g,"").trim();
      const parsed=JSON.parse(clean);
      const tamAd = [parsed.sahipAd||"", parsed.sahipSoyad||""].filter(Boolean).join(" ");
      setForm(p=>({...p,
        plaka:parsed.plaka||p.plaka,saseNo:parsed.saseNo||p.saseNo,motorNo:parsed.motorNo||p.motorNo,
        marka:parsed.marka||p.marka,model:parsed.model||p.model,yil:parsed.yil||p.yil,
        ruhsatSeriNo:parsed.ruhsatSeriNo||p.ruhsatSeriNo,
        sahipAd:tamAd||p.sahipAd,tc:parsed.tcVeyaVergiNo||p.tc,renk:parsed.renk||p.renk,
      }));
      setTaramaOk(true);
    }catch(e){setTaramaHata(true);}
    finally{setTarama(false);}
  };

  const handleRuhsat=(files)=>{
    const f=files[0];if(!f)return;
    const r=new FileReader();
    r.onload=e=>{setRuhsatImg(e.target.result);setTaramaOk(false);};
    r.readAsDataURL(f);
  };

  const handleBelge=(files)=>Array.from(files).forEach(f=>{
    const r=new FileReader();
    r.onload=e=>setBelgeler(p=>[...p,{id:Date.now()+Math.random(),ad:f.name,url:e.target.result,boyut:(f.size/1048576).toFixed(1)+" MB"}]);
    r.readAsDataURL(f);
  });

  const handleFoto=(files)=>Array.from(files).filter(f=>f.type.startsWith("image/")).forEach(f=>{
    const r=new FileReader();
    r.onload=e=>setFotograflar(p=>[...p,{id:Date.now()+Math.random(),url:e.target.result,etiket:f.name.replace(/\.[^.]+$/,""),kategori:"kaza",tarih:new Date().toLocaleDateString("tr-TR"),yukleyen:"Danışman",boyut:(f.size/1048576).toFixed(1)+" MB"}]);
    r.readAsDataURL(f);
  });

  const kaydet=()=>{
    setKayitOk(true);
    setTimeout(()=>onKaydet({form,belgeler,fotograflar}),1500);
  };

  const ADIMLAR=[{n:1,l:"Ruhsat",i:"📄"},{n:2,l:"Araç & Müşteri",i:"🚗"},{n:3,l:"Sigorta & Kaza",i:"🏦"},{n:4,l:"Belgeler",i:"📎"},{n:5,l:"Özet",i:"✅"}];
  const inp=(k,p,mono)=><input type="text" value={form[k]} onChange={e=>sf(k,e.target.value)} placeholder={p} style={{width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:9,color:"#E2E8F0",padding:"11px 13px",fontSize:13,fontFamily:mono?"'JetBrains Mono',monospace":"inherit"}}/>;
  const lbl=(t)=><div style={{fontSize:11,color:"#64748B",fontWeight:600,marginBottom:6,marginTop:12}}>{t}</div>;
  const grid2={display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",gap:"0 14px"};

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:200,display:"flex",alignItems:"flex-start",justifyContent:"center",padding:isMobile?0:24,overflowY:"auto"}}>
      <div style={{background:"#0D1117",border:"1px solid rgba(255,255,255,0.1)",borderRadius:isMobile?0:16,width:"100%",maxWidth:680,minHeight:isMobile?"100vh":"auto",display:"flex",flexDirection:"column",animation:"popIn .25s ease"}}>
        <div style={{background:"#111827",borderBottom:"1px solid rgba(255,255,255,0.07)",borderRadius:isMobile?"0":"16px 16px 0 0",padding:"16px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:10}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:34,height:34,borderRadius:8,background:"linear-gradient(135deg,#1E40AF,#4F46E5)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>📁</div>
            <div><div style={{fontWeight:800,fontSize:15}}>Yeni Hasar Dosyası</div><div style={{fontSize:11,color:"#475569"}}>Adım {adim} / 5</div></div>
          </div>
          <button onClick={onKapat} style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",color:"#94A3B8",borderRadius:"50%",width:32,height:32,fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
        </div>
        <div style={{padding:"14px 20px",background:"#111827",borderBottom:"1px solid rgba(255,255,255,0.05)",display:"flex",gap:4}}>
          {ADIMLAR.map(a=>(
            <div key={a.n} onClick={()=>a.n<adim&&setAdim(a.n)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:5,cursor:a.n<adim?"pointer":"default"}}>
              <div style={{width:"100%",height:3,borderRadius:2,background:adim>=a.n?"#4F46E5":"rgba(255,255,255,0.08)"}}/>
              <div style={{fontSize:9,color:adim===a.n?"#818CF8":adim>a.n?"#10B981":"#334155",fontWeight:adim===a.n?700:500,textAlign:"center",whiteSpace:"nowrap"}}>{isMobile?a.i:`${a.i} ${a.l}`}</div>
            </div>
          ))}
        </div>
        <div style={{flex:1,overflow:"auto",padding:20}}>
          {adim===1&&(
            <div style={{display:"flex",flexDirection:"column",gap:16}}>
              <div style={{padding:"12px 16px",background:"rgba(79,70,229,0.07)",border:"1px solid rgba(79,70,229,0.2)",borderRadius:10,fontSize:13,color:"#94A3B8",lineHeight:1.7}}>
                🤖 <strong style={{color:"#818CF8"}}>AI Ruhsat Taraması</strong> — Araç tescil belgesinin fotoğrafını yükleyin. Claude yapay zeka motoru, belgedeki bilgileri otomatik okuyup forma aktaracak.
              </div>
              <div onClick={()=>ruhsatRef.current?.click()} onDragOver={e=>e.preventDefault()} onDrop={e=>{e.preventDefault();handleRuhsat(e.dataTransfer.files);}} style={{border:`2px dashed ${ruhsatImg?"rgba(79,70,229,0.5)":"rgba(255,255,255,0.15)"}`,borderRadius:12,padding:ruhsatImg?"0":"32px",textAlign:"center",cursor:"pointer",background:ruhsatImg?"#0D1117":"rgba(255,255,255,0.02)",position:"relative",overflow:"hidden",minHeight:180}}>
                <input ref={ruhsatRef} type="file" accept="image/*" onChange={e=>handleRuhsat(e.target.files)} style={{display:"none"}}/>
                {ruhsatImg?(
                  <div>
                    <img src={ruhsatImg} alt="Ruhsat" style={{width:"100%",maxHeight:260,objectFit:"contain",display:"block",borderRadius:10}}/>
                    <div style={{position:"absolute",top:8,right:8}}>
                      <button onClick={e=>{e.stopPropagation();setRuhsatImg(null);setTaramaOk(false);}} style={{background:"rgba(239,68,68,0.85)",border:"none",color:"#fff",borderRadius:6,padding:"4px 10px",fontSize:11,fontWeight:700}}>✕ Kaldır</button>
                    </div>
                    {taramaOk&&<div style={{position:"absolute",top:8,left:8,background:"rgba(16,185,129,0.9)",color:"#fff",borderRadius:6,padding:"4px 10px",fontSize:11,fontWeight:700}}>✓ Veriler çekildi</div>}
                  </div>
                ):(
                  <div>
                    <div style={{fontSize:48,marginBottom:12}}>📄</div>
                    <div style={{fontWeight:700,fontSize:14,color:"#818CF8",marginBottom:6}}>Ruhsat fotoğrafını sürükleyin</div>
                    <div style={{fontSize:12,color:"#475569",marginBottom:16}}>veya tıklayarak seçin · JPG, PNG</div>
                    <button style={{background:"rgba(79,70,229,0.2)",border:"1px solid rgba(79,70,229,0.4)",color:"#818CF8",borderRadius:9,padding:"10px 20px",fontSize:13,fontWeight:700}}>📷 Fotoğraf Seç</button>
                  </div>
                )}
              </div>
              {ruhsatImg&&!taramaOk&&(
                <button onClick={ruhsatTara} disabled={tarama} style={{background:tarama?"rgba(79,70,229,0.4)":"#4F46E5",border:"none",color:"#fff",borderRadius:10,padding:14,fontSize:14,fontWeight:800}}>
                  {tarama?(
                    <span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
                      <span style={{width:18,height:18,border:"2px solid rgba(255,255,255,0.3)",borderTop:"2px solid #fff",borderRadius:"50%",display:"inline-block",animation:"spin .7s linear infinite"}}/>
                      Claude verileri okuyor...
                    </span>
                  ):"🤖 Verileri Otomatik Çek"}
                </button>
              )}
              {taramaHata&&<div style={{padding:"11px 14px",background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.25)",borderRadius:9,fontSize:12,color:"#EF4444"}}>⚠ Belge okunamadı. Daha net fotoğraf deneyin veya verileri elle girin.</div>}
              {taramaOk&&(
                <div style={{padding:"12px 16px",background:"rgba(16,185,129,0.07)",border:"1px solid rgba(16,185,129,0.25)",borderRadius:10}}>
                  <div style={{fontWeight:700,fontSize:13,color:"#10B981",marginBottom:10}}>✓ Otomatik Çekilen Veriler</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                    {[["Plaka",form.plaka],["Sahip",form.sahipAd],["TC / Vergi No",form.tc],["Marka",form.marka],["Model",form.model],["Yıl",form.yil],["Şase No",form.saseNo],["Motor No",form.motorNo],["Ruhsat Seri No",form.ruhsatSeriNo],["Renk",form.renk]].filter(r=>r[1]).map(r=>(
                      <div key={r[0]} style={{background:"rgba(255,255,255,0.03)",borderRadius:7,padding:"7px 10px"}}>
                        <div style={{fontSize:9,color:"#475569",fontWeight:600}}>{r[0]}</div>
                        <div style={{fontSize:12,fontWeight:600,color:"#CBD5E1"}}>{r[1]}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              <div style={{padding:"10px 14px",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:9,fontSize:11,color:"#475569",textAlign:"center"}}>
                Ruhsat yoksa →{" "}
                <button onClick={()=>setAdim(2)} style={{background:"none",border:"none",color:"#818CF8",fontSize:11,textDecoration:"underline",cursor:"pointer"}}>Verileri Elle Gir</button>
              </div>
            </div>
          )}
          {adim===2&&(
            <div>
              <ST>🚗 Araç Bilgileri {taramaOk&&<Chip renk="#10B981" sm>✓ Ruhsattan aktarıldı</Chip>}</ST>
              <div style={grid2}>
                <div>{lbl("PLAKA")}{inp("plaka","34 ABC 123",true)}</div>
                <div>{lbl("RUHSAT SERİ NO")}{inp("ruhsatSeriNo","AA123456",true)}</div>
                <div>{lbl("ŞASİ NO")}{inp("saseNo","JTDXXXXXXXXXXXXXXX",true)}</div>
                <div>{lbl("MOTOR NO")}{inp("motorNo","1NZ-XXXXXXX",true)}</div>
                <div>{lbl("MARKA")}{inp("marka","Toyota")}</div>
                <div>{lbl("MODEL")}{inp("model","Corolla 1.6")}</div>
                <div>{lbl("MODEL YILI")}{inp("yil","2021")}</div>
                <div>{lbl("RENK")}{inp("renk","Sedef Beyaz")}</div>
              </div>
              <div style={{borderTop:"1px solid rgba(255,255,255,0.06)",marginTop:20,paddingTop:20}}>
                <ST>👤 Araç Sahibi</ST>
                <div style={grid2}>
                  <div>{lbl("AD SOYAD")}{inp("sahipAd","Mehmet Yılmaz")}</div>
                  <div>{lbl("TC KİMLİK NO")}{inp("tc","12345678901",true)}</div>
                  <div>
                    <div style={{fontSize:11,color:"#EF4444",fontWeight:700,marginBottom:6,marginTop:12,display:"flex",alignItems:"center",gap:6}}>
                      TELEFON <span style={{background:"rgba(239,68,68,0.15)",color:"#EF4444",borderRadius:4,padding:"1px 6px",fontSize:9}}>✱ Zorunlu</span>
                    </div>
                    <input type="tel" value={form.telefon} onChange={e=>sf("telefon",e.target.value)} placeholder="0532 123 45 67" style={{width:"100%",background:!form.telefon?"rgba(239,68,68,0.06)":"rgba(255,255,255,0.05)",border:`1px solid ${!form.telefon?"rgba(239,68,68,0.4)":"rgba(255,255,255,0.1)"}`,borderRadius:9,color:"#E2E8F0",padding:"12px 13px",fontSize:14,fontFamily:"'JetBrains Mono',monospace"}}/>
                    {!form.telefon&&<div style={{fontSize:11,color:"#EF4444",marginTop:5,display:"flex",gap:5,alignItems:"center"}}>⚠ Müşteriyle iletişim için telefon numarası zorunludur</div>}
                  </div>
                  <div>{lbl("E-POSTA")}{inp("email","eposta@...")}</div>
                </div>
              </div>
            </div>
          )}
          {adim===3&&(
            <div>
              <ST>🏦 Sigorta Bilgileri</ST>
              <div style={grid2}>
                <div>{lbl("YÖNLENDİREN ACENTE")}{inp("acente","ABC Sigorta Acentesi")}</div>
                <div>{lbl("SİGORTA ŞİRKETİ")}{inp("sigortaSirketi","AXA Sigorta A.Ş.")}</div>
                <div>{lbl("SİGORTA BRANŞI")}{inp("bransi","Kasko")}</div>
                <div>{lbl("MUALLAK HASAR TUTARI")}{inp("muallakHasar","28.500 ₺")}</div>
                <div>{lbl("POLİÇE NO")}{inp("policeNo","POL-2024-XXXXX",true)}</div>
                <div>{lbl("HASAR NO")}{inp("hasarNo","HAK-2024-XXXXX",true)}</div>
                <div>{lbl("TEMİNAT TÜRÜ")}{inp("teminat","Kasko (Tam)")}</div>
                <div>{lbl("MUAFİYET")}{inp("muafiyet","2.500 ₺")}</div>
              </div>
              <div style={{borderTop:"1px solid rgba(255,255,255,0.06)",marginTop:20,paddingTop:20}}>
                <ST>🚨 Kaza Bilgileri</ST>
                {lbl("KAZA TARİHİ")}{inp("kazaTarihi","GG.AA.YYYY")}
                {lbl("KAZA AÇIKLAMASI")}
                <textarea value={form.kazaAciklama} onChange={e=>sf("kazaAciklama",e.target.value)} rows={4} placeholder="Kazanın nasıl gerçekleştiğini açıklayın..." style={{width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:9,color:"#E2E8F0",padding:"11px 13px",fontSize:13,resize:"none",lineHeight:1.6,marginTop:6}}/>
              </div>
            </div>
          )}
          {adim===4&&(
            <div>
              <ST>📎 Belgeler</ST>
              <div style={{fontSize:12,color:"#64748B",marginBottom:12}}>Kaza tespit tutanağı, ehliyet, ruhsat fotokopisi vb.</div>
              <div onClick={()=>belgeRef.current?.click()} style={{border:"2px dashed rgba(79,70,229,0.3)",borderRadius:10,padding:20,textAlign:"center",cursor:"pointer",background:"rgba(79,70,229,0.03)",marginBottom:12}}>
                <input ref={belgeRef} type="file" multiple accept=".pdf,.jpg,.jpeg,.png" onChange={e=>handleBelge(e.target.files)} style={{display:"none"}}/>
                <div style={{fontSize:28,marginBottom:8}}>📂</div>
                <div style={{fontWeight:600,fontSize:13,color:"#818CF8",marginBottom:4}}>Belge yükle</div>
                <div style={{fontSize:11,color:"#475569"}}>PDF, JPG, PNG</div>
              </div>
              {belgeler.map(b=>(
                <div key={b.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:8,marginBottom:6}}>
                  <span style={{fontSize:16}}>📄</span>
                  <div style={{flex:1,minWidth:0}}><div style={{fontSize:12,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{b.ad}</div><div style={{fontSize:10,color:"#64748B"}}>{b.boyut}</div></div>
                  <button onClick={()=>setBelgeler(p=>p.filter(x=>x.id!==b.id))} style={{background:"none",border:"none",color:"#EF4444",fontSize:16}}>×</button>
                </div>
              ))}
              <div style={{borderTop:"1px solid rgba(255,255,255,0.06)",marginTop:20,paddingTop:20}}>
                <ST>📷 Hasar Fotoğrafları</ST>
                <div onClick={()=>fotoRef.current?.click()} style={{border:"2px dashed rgba(139,92,246,0.3)",borderRadius:10,padding:20,textAlign:"center",cursor:"pointer",background:"rgba(139,92,246,0.03)",marginBottom:12}}>
                  <input ref={fotoRef} type="file" multiple accept="image/*" onChange={e=>handleFoto(e.target.files)} style={{display:"none"}}/>
                  <div style={{fontSize:28,marginBottom:8}}>🖼️</div>
                  <div style={{fontWeight:600,fontSize:13,color:"#A78BFA",marginBottom:4}}>Fotoğraf yükle</div>
                  <div style={{fontSize:11,color:"#475569"}}>JPG, PNG, WEBP · Birden fazla seçilebilir</div>
                </div>
                {fotograflar.length>0&&(
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                    {fotograflar.map(f=>(
                      <div key={f.id} style={{position:"relative",borderRadius:8,overflow:"hidden"}}>
                        <img src={f.url} alt={f.etiket} style={{width:"100%",aspectRatio:"4/3",objectFit:"cover",display:"block"}}/>
                        <button onClick={()=>setFotograflar(p=>p.filter(x=>x.id!==f.id))} style={{position:"absolute",top:4,right:4,background:"rgba(239,68,68,0.85)",border:"none",color:"#fff",borderRadius:"50%",width:22,height:22,fontSize:13,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          )}
          {adim===5&&(
            <div style={{display:"flex",flexDirection:"column",gap:14}}>
              {kayitOk?(
                <div style={{textAlign:"center",padding:"40px 20px"}}>
                  <div style={{fontSize:60,marginBottom:16}}>✅</div>
                  <div style={{fontWeight:800,fontSize:22,marginBottom:8,color:"#10B981"}}>Dosya Oluşturuldu!</div>
                  <div style={{fontSize:13,color:"#64748B"}}>Hasar dosyası sisteme kaydedildi...</div>
                </div>
              ):(
                <>
                  <ST>📋 Dosya Özeti</ST>
                  {[
                    {t:"🚗 Araç",r:[["Araç",`${form.marka} ${form.model} (${form.yil})`],["Plaka",form.plaka],["Şase No",form.saseNo],["Motor No",form.motorNo]]},
                    {t:"👤 Müşteri",r:[["Ad Soyad",form.sahipAd],["TC",form.tc],["Telefon",form.telefon]]},
                    {t:"🏦 Sigorta",r:[["Acente",form.acente],["Şirket",form.sigortaSirketi],["Branş",form.bransi],["Muallak",form.muallakHasar],["Poliçe",form.policeNo]]},
                    {t:"🚨 Kaza",r:[["Tarih",form.kazaTarihi],["Açıklama",form.kazaAciklama]]},
                  ].map(grup=>(
                    <Card key={grup.t}>
                      <div style={{fontWeight:700,fontSize:12,marginBottom:10,color:"#94A3B8"}}>{grup.t}</div>
                      {grup.r.filter(s=>s[1]).map(s=>(
                        <div key={s[0]} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
                          <span style={{fontSize:12,color:"#64748B"}}>{s[0]}</span>
                          <span style={{fontSize:12,fontWeight:500,color:"#CBD5E1",textAlign:"right",maxWidth:"60%"}}>{s[1]}</span>
                        </div>
                      ))}
                    </Card>
                  ))}
                  <Card>
                    <div style={{display:"flex",gap:20}}>
                      <div><div style={{fontSize:9,color:"#475569",fontWeight:600}}>BELGELER</div><div style={{fontSize:18,fontWeight:800,color:"#818CF8"}}>{belgeler.length}</div></div>
                      <div><div style={{fontSize:9,color:"#475569",fontWeight:600}}>FOTOĞRAFLAR</div><div style={{fontSize:18,fontWeight:800,color:"#3B82F6"}}>{fotograflar.length}</div></div>
                    </div>
                  </Card>
                </>
              )}
            </div>
          )}
        </div>
        {!kayitOk&&(
          <div style={{padding:"14px 20px",borderTop:"1px solid rgba(255,255,255,0.07)",display:"flex",justifyContent:"space-between",gap:10,background:"#111827",borderRadius:isMobile?"0":"0 0 16px 16px",position:"sticky",bottom:0}}>
            <button onClick={()=>adim>1?setAdim(a=>a-1):onKapat()} style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",color:"#94A3B8",borderRadius:9,padding:"11px 20px",fontSize:13,fontWeight:600}}>
              {adim===1?"İptal":"← Geri"}
            </button>
            {adim<5
              ? <button onClick={()=>{if(adim===2&&!form.telefon){alert("Lütfen araç sahibinin telefon numarasını girin.");return;}setAdim(a=>a+1);}} style={{background:adim===2&&!form.telefon?"rgba(79,70,229,0.4)":"#4F46E5",border:"none",color:"#fff",borderRadius:9,padding:"11px 24px",fontSize:13,fontWeight:700}}>İleri →</button>
              : <button onClick={kaydet} style={{background:"#10B981",border:"none",color:"#fff",borderRadius:9,padding:"11px 28px",fontSize:14,fontWeight:800}}>💾 Dosyayı Kaydet</button>
            }
          </div>
        )}
      </div>
    </div>
  );
}

// ─── MÜŞTERİ PANELİ ───────────────────────────────────────────────────────
function MusteriPanel({onCikis}){
  const adimlar=ONARIM_ADIMLARI;
  const aktif=adimlar.find(a=>a.durum==="aktif");
  const tamam=adimlar.filter(a=>a.durum==="tamamlandi").length;
  const pct=Math.round((tamam/adimlar.length)*100);
  const [isMobile,setIsMobile]=useState(false);
  useEffect(()=>{const c=()=>setIsMobile(window.innerWidth<768);c();window.addEventListener("resize",c);return()=>window.removeEventListener("resize",c);},[]);
  return(
    <div style={{fontFamily:"'Inter',sans-serif",background:"#0D1117",minHeight:"100vh",color:"#E2E8F0"}}>
      <div style={{background:"#111827",borderBottom:"1px solid rgba(255,255,255,0.07)",padding:`0 ${isMobile?12:24}px`,height:56,display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:50}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:32,height:32,borderRadius:8,background:"linear-gradient(135deg,#92400E,#F59E0B)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>👤</div>
          <div><div style={{fontWeight:800,fontSize:14}}>HasarTrack</div><div style={{fontSize:10,color:"#475569"}}>Sigortalı Portalı</div></div>
        </div>
        <button onClick={onCikis} style={{background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.2)",color:"#EF4444",borderRadius:7,padding:"5px 12px",fontSize:11,fontWeight:700}}>Çıkış</button>
      </div>
      <div style={{padding:`${isMobile?12:24}px`,maxWidth:600,margin:"0 auto",display:"flex",flexDirection:"column",gap:14}}>
        <div style={{background:"linear-gradient(135deg,rgba(245,158,11,0.1),rgba(245,158,11,0.03))",border:"1px solid rgba(245,158,11,0.2)",borderRadius:16,padding:20}}>
          <div style={{fontSize:11,color:"#F59E0B",fontWeight:700,letterSpacing:"0.5px",marginBottom:6}}>HOŞ GELDİNİZ</div>
          <div style={{fontWeight:800,fontSize:isMobile?18:22,marginBottom:4}}>Merhaba, Mehmet Bey 👋</div>
          <div style={{fontSize:13,color:"#94A3B8",marginBottom:14}}>Aracınızın hasar dosyası aktif olarak takip edilmektedir.</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <Chip renk="#F59E0B">{DEMO_DOSYA.arac.plaka}</Chip>
            <Chip renk="#64748B">{DEMO_DOSYA.id}</Chip>
            <Chip renk="#10B981">● Aktif</Chip>
          </div>
        </div>
        <Card style={{background:"rgba(79,70,229,0.07)",border:"1px solid rgba(79,70,229,0.22)"}}>
          <div style={{fontSize:10,color:"#818CF8",fontWeight:800,letterSpacing:"0.8px",marginBottom:8}}>⬤ MEVCUT DURUM</div>
          <div style={{fontWeight:800,fontSize:isMobile?18:22,marginBottom:6}}>{aktif?.ad}</div>
          <div style={{fontSize:13,color:"#94A3B8",lineHeight:1.6,marginBottom:16}}>{aktif?.not}</div>

  useEffect(()=>{const c=()=>setIsMobile(window.innerWidth<768);c();window.addEventListener("resize",c);return()=>window.removeEventListener("resize",c);},[]);

  const eksikEvrak=evrak.filter(e=>e.durum==="eksik");

  const eP=Math.round((tamamEvrak/evrak.length)*100);

    const parts=yol.split(".");
    let obj=next;
    for(let i=0;i<parts.length-1;i++){obj[parts[i]]={...obj[parts[i]]};obj=obj[parts[i]];}
    obj[parts[parts.length-1]]=val;
    return next;
  });

  const adimTamamla=(id)=>{
    let adimAdi="";
    setAdimlar(prev=>{
      const idx=prev.findIndex(a=>a.id===id);
      if(idx===-1)return prev;
      adimAdi=prev[idx].ad;
      const next=[...prev];
      next[idx]={...next[idx],durum:"tamamlandi",tarih:new Date().toLocaleDateString("tr-TR")};
      if(idx+1<next.length)next[idx+1]={...next[idx+1],durum:"aktif"};
      return next;
    });

      const adimObj=adimlar.find(a=>a.ad===adimAdi);

      setPhotos(p=>[np,...p]);

    r.readAsDataURL(f);

  const katDegistir=(id,k)=>setPhotos(p=>p.map(ph=>ph.id===id?{...ph,kategori:k}:ph));
  const mesajGonder=()=>{if(!mesajMetin.trim())return;setMesajlar(p=>[...p,{id:p.length+1,gonderen:"Danışman",hedef,tarih:"Şimdi",mesaj:mesajMetin.trim()}]);setMesajMetin("");};

  const EM=(k)=>editMode===k;

  const TABS=[
    {id:"ozet",l:"Özet",mi:"📋"},

    {id:"onarim",l:"Onarım",mi:"🔧"},
    {id:"evrak",l:"Evrak",mi:"📄",badge:true},

    {id:"iletisim",l:"Mesaj",mi:"💬"},
    {id:"sms",l:"SMS",mi:"📱",sms:true},
  ];

              <img src={lightboxFoto.url} alt={lightboxFoto.etiket} style={{width:"100%",maxHeight:"70vh",objectFit:"contain",display:"block"}}/>
              {lbIdx>0&&<button onClick={()=>setLightboxFoto(filtrePhotos[lbIdx-1])} style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",background:"rgba(0,0,0,0.6)",border:"1px solid rgba(255,255,255,0.15)",color:"#fff",borderRadius:"50%",width:40,height:40,fontSize:22,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>}
              {lbIdx<filtrePhotos.length-1&&<button onClick={()=>setLightboxFoto(filtrePhotos[lbIdx+1])} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"rgba(0,0,0,0.6)",border:"1px solid rgba(255,255,255,0.15)",color:"#fff",borderRadius:"50%",width:40,height:40,fontSize:22,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>}
            </div>
            <div style={{background:"#161B26",border:"1px solid rgba(255,255,255,0.08)",borderRadius:10,padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
              <div><div style={{fontWeight:700,fontSize:14}}>{lightboxFoto.etiket}</div><div style={{fontSize:12,color:"#64748B",marginTop:2}}>{lightboxFoto.tarih} · {lightboxFoto.yukleyen} · {lightboxFoto.boyut}</div></div>
              <a href={lightboxFoto.url} download={`${lightboxFoto.etiket}.jpg`} style={{background:"rgba(79,70,229,0.15)",border:"1px solid rgba(79,70,229,0.3)",color:"#818CF8",borderRadius:6,padding:"5px 13px",fontSize:11,fontWeight:700,textDecoration:"none"}}>⬇ İndir</a>
            </div>
          </div>
        </div>
      )}

      {/* TOAST */}
      {toast&&(
        <div style={{position:"fixed",bottom:isMobile?72:24,left:"50%",transform:"translateX(-50%)",zIndex:500,maxWidth:360,width:"calc(100% - 32px)",animation:"fadeUp .3s ease"}}>
          <div style={{background:"#161B26",border:"1px solid rgba(16,185,129,0.35)",borderRadius:14,padding:"14px 16px",boxShadow:"0 8px 32px rgba(0,0,0,0.5)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <div style={{width:32,height:32,borderRadius:8,background:"rgba(16,185,129,0.15)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>📱</div>
                <div><div style={{fontWeight:700,fontSize:13,color:"#10B981"}}>Otomatik SMS Gönderildi</div><div style={{fontSize:11,color:"#64748B",marginTop:1}}>{toast.telefon}</div></div>
              </div>
              <button onClick={()=>setToast(null)} style={{background:"none",border:"none",color:"#475569",fontSize:18,marginLeft:8}}>×</button>
            </div>
            <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:8,padding:"8px 10px",marginBottom:8}}>
              <div style={{fontSize:10,color:"#475569",fontWeight:600,marginBottom:4}}>GÖNDERİLEN MESAJ</div>
              <div style={{fontSize:12,color:"#94A3B8",lineHeight:1.6}}>{toast.mesaj}</div>
            </div>
            <div style={{fontSize:10,color:"#10B981",display:"flex",gap:6,alignItems:"center"}}>
              <div style={{width:6,height:6,borderRadius:"50%",background:"#10B981",animation:"pulse 1.5s infinite"}}/>
              ✓ Adım tamamlandığında otomatik tetiklendi
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── ANA ROUTER ───────────────────────────────────────────────────────────
function App(){
  const [ekran,setEkran]=useState("rolsecim");
  const [wizardAcik,setWizardAcik]=useState(false);
  return(
    <>
      {ekran==="rolsecim"&&<RolSecim onRol={r=>setEkran(`${r}-giris`)}/>}
      {ekran==="danisman-giris"&&<DanismanGiris onGiris={()=>setEkran("danisman-dashboard")} onGeri={()=>setEkran("rolsecim")}/>}
      {ekran==="acente-giris"&&<AcenteGiris onGiris={()=>setEkran("acente")} onGeri={()=>setEkran("rolsecim")}/>}
      {ekran==="musteri-giris"&&<MusteriGiris onGiris={()=>setEkran("musteri")} onGeri={()=>setEkran("rolsecim")}/>}
      {ekran==="danisman-dashboard"&&(
        <>
          <DanismanDashboard onDosyaSec={()=>setEkran("danisman-panel")} onYeniDosya={()=>setWizardAcik(true)} onCikis={()=>setEkran("rolsecim")}/>
          {wizardAcik&&<YeniDosyaWizard onKapat={()=>setWizardAcik(false)} onKaydet={()=>{setWizardAcik(false);setEkran("danisman-panel");}}/>}
        </>
      )}
      {ekran==="danisman-panel"&&<DanismanPanel onCikis={()=>setEkran("danisman-dashboard")}/>}
      {ekran==="acente"&&<AcentePanel onCikis={()=>setEkran("rolsecim")}/>}
      {ekran==="musteri"&&<MusteriPanel onCikis={()=>setEkran("rolsecim")}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
