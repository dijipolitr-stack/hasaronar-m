  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { background: #0D1117; color: #E2E8F0; font-family: 'Inter', 'Segoe UI', sans-serif; -webkit-font-smoothing: antialiased; }
    ::-webkit-scrollbar { width: 3px; height: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1E293B; border-radius: 2px; }
    button { transition: filter 0.15s; font-family: inherit; }
    button:hover { filter: brightness(1.12); }
    textarea, input[type=text] { outline: none; }
    .toggle { position: relative; width: 44px; height: 24px; display: inline-block; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; inset: 0; background: #334155; border-radius: 24px; transition: 0.3s; }
    .slider:before { content: ""; position: absolute; height: 18px; width: 18px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: 0.3s; }
    input:checked + .slider { background: #4F46E5; }
    input:checked + .slider:before { transform: translateX(20px); }
    .photo-card { transition: transform 0.2s; }
    .photo-card:hover { transform: scale(1.02); }
    .photo-card:hover .photo-overlay { opacity: 1 !important; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    @keyframes fadeUp { from{transform:translateY(8px);opacity:0} to{transform:translateY(0);opacity:1} }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes shimmer { 0%{opacity:0.4} 50%{opacity:0.9} 100%{opacity:0.4} }
  </style>
</head>

    // ─── LIGHTBOX ───────────────────────────────────────────────────────────────
    function Lightbox({ foto, onClose, onPrev, onNext, hasPrev, hasNext }) {
      useEffect(() => {
        const h = (e) => {
          if (e.key === "Escape") onClose();
          if (e.key === "ArrowLeft" && hasPrev) onPrev();
          if (e.key === "ArrowRight" && hasNext) onNext();
        };
        window.addEventListener("keydown", h);
        return () => window.removeEventListener("keydown", h);
      }, [hasPrev, hasNext]);

      const kat = KATEGORILER.find(k => k.id === foto.kategori);
      return (
        <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.92)", zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}>

              {hasNext && <button onClick={onNext} style={{ position: "absolute", right: 12, top: "50%", transform: "translateY(-50%)", background: "rgba(0,0,0,0.6)", border: "1px solid rgba(255,255,255,0.15)", color: "#fff", borderRadius: "50%", width: 40, height: 40, fontSize: 22, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>›</button>}
            </div>
            <div style={{ background: "#161B26", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 10, padding: "12px 16px", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
              <div>
                <div style={{ fontWeight: 700, fontSize: 14 }}>{foto.etiket}</div>
                <div style={{ fontSize: 12, color: "#64748B", marginTop: 2 }}>{foto.tarih} · {foto.yukleyen} · {foto.boyut}</div>
              </div>

    // ─── DROP ZONE ──────────────────────────────────────────────────────────────
    function DropZone({ onUpload, isMobile }) {
      const [dragging, setDragging] = useState(false);
      const inputRef = useRef();

      const handleFiles = (files) => {
        const valid = Array.from(files).filter(f => f.type.startsWith("image/"));
        valid.forEach(file => {
          const reader = new FileReader();
          reader.onload = (e) => onUpload({
            id: Date.now() + Math.random(),
            url: e.target.result,
            etiket: file.name.replace(/\.[^.]+$/, ""),
            kategori: "kaza",
            tarih: new Date().toLocaleDateString("tr-TR"),
            yukleyen: "Danışman",
            boyut: (file.size / (1024 * 1024)).toFixed(1) + " MB",
          });
          reader.readAsDataURL(file);
        });
      };

      return (
        <div
          onClick={() => inputRef.current?.click()}
          onDragOver={e => { e.preventDefault(); setDragging(true); }}
          onDragLeave={() => setDragging(false)}
          onDrop={e => { e.preventDefault(); setDragging(false); handleFiles(e.dataTransfer.files); }}
          style={{ border: `2px dashed ${dragging ? "#4F46E5" : "rgba(79,70,229,0.3)"}`, borderRadius: 12, padding: isMobile ? "24px 16px" : "32px 24px", textAlign: "center", cursor: "pointer", background: dragging ? "rgba(79,70,229,0.08)" : "rgba(79,70,229,0.03)", transition: "all 0.2s" }}
        >
          <input ref={inputRef} type="file" accept="image/*" multiple onChange={e => handleFiles(e.target.files)} style={{ display: "none" }} />
          <div style={{ fontSize: isMobile ? 36 : 44, marginBottom: 10 }}>📷</div>
          <div style={{ fontWeight: 700, fontSize: isMobile ? 13 : 14, color: "#818CF8", marginBottom: 6 }}>
            {isMobile ? "Fotoğraf Ekle" : "Fotoğraf sürükleyin veya tıklayın"}
          </div>
          <div style={{ fontSize: 11, color: "#475569" }}>
            {isMobile ? "Galeriden seçin veya kamerayla çekin" : "JPG, PNG, WEBP · Birden fazla seçilebilir"}
          </div>
          <button
            onClick={e => { e.stopPropagation(); inputRef.current?.click(); }}
            style={{ marginTop: 14, background: "#4F46E5", border: "none", color: "#fff", borderRadius: 9, padding: "10px 24px", fontSize: 13, fontWeight: 700, cursor: "pointer" }}
          >
            📷 Fotoğraf Seç
          </button>
        </div>
      );
    }

                  {smsModu === "ozel" && (
                    <div style={{ marginBottom: 16 }}>
                      <div style={{ fontSize: 11, color: "#64748B", fontWeight: 600, marginBottom: 8 }}>ÖZEL MESAJ</div>
                      <textarea value={ozelMesaj} onChange={e => setOzelMesaj(e.target.value)} placeholder="Özel mesaj yazın..." style={{ width: "100%", background: "rgba(255,255,255,0.03)", border: "1px solid rgba(245,158,11,0.25)", borderRadius: 8, color: "#E2E8F0", padding: 12, fontSize: 12, resize: "none", minHeight: 90, lineHeight: 1.6 }} />
                    </div>
                  )}
                  <div style={{ display: "flex", gap: 8 }}>
                    <button onClick={smsGonder} disabled={smsGonderiliyor || !smsAktif} style={{ flex: 1, background: smsGonderildi ? "#10B981" : smsGonderiliyor ? "rgba(79,70,229,0.4)" : "#4F46E5", border: "none", color: "#fff", borderRadius: 9, padding: "13px", fontSize: 13, fontWeight: 700, cursor: smsGonderiliyor || !smsAktif ? "not-allowed" : "pointer" }}>
                      {smsGonderiliyor ? <span style={{ animation: "pulse 0.8s infinite" }}>⏳ Gönderiliyor...</span> : smsGonderildi ? "✓ İletildi!" : "📤 Şimdi Gönder"}
                    </button>
                    <button style={{ background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)", color: "#64748B", borderRadius: 9, padding: "13px 16px", fontSize: 12, cursor: "pointer" }}>⏰</button>
                  </div>
                  {!smsAktif && <div style={{ marginTop: 8, fontSize: 11, color: "#EF4444", textAlign: "center" }}>⚠ SMS devre dışı. Yukarıdan aktif edin.</div>}
                </Card>

                <div style={{ background: "rgba(79,70,229,0.06)", border: "1px solid rgba(79,70,229,0.2)", borderRadius: 12, padding: 16, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div>
                    <div style={{ fontSize: 10, color: "#818CF8", fontWeight: 700, marginBottom: 4 }}>⏰ SONRAKI GÖNDERIM</div>
                    <div style={{ fontSize: 22, fontWeight: 800 }}>{smsSaati}</div>
                    <div style={{ fontSize: 11, color: "#64748B" }}>Yarın · {SMS_SABLONLARI[aktifAdim]?.baslik}</div>
                  </div>
                  {smsAktif
                    ? <div style={{ fontSize: 11, color: "#4F46E5", display: "flex", gap: 6, alignItems: "center" }}><div style={{ width: 7, height: 7, borderRadius: "50%", background: "#4F46E5", animation: "pulse 1.5s infinite" }} />Aktif</div>
                    : <div style={{ fontSize: 11, color: "#EF4444" }}>⚠ Pasif</div>}
                </div>

                <Card>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
                    <div style={{ fontWeight: 700, fontSize: 13 }}>📜 SMS Geçmişi</div>
                    <Chip renk="#4F46E5">{smsMesajlar.filter(m => m.durum === "iletildi").length} iletildi</Chip>
                  </div>
                  {smsMesajlar.map(sms => {
                    const sb = SMS_SABLONLARI[sms.sablon];
                    return (
                      <div key={sms.id} style={{ padding: "11px 13px", background: sms.durum === "iletildi" ? "rgba(16,185,129,0.04)" : "rgba(245,158,11,0.05)", border: `1px solid ${sms.durum === "iletildi" ? "rgba(16,185,129,0.15)" : "rgba(245,158,11,0.2)"}`, borderRadius: 9, marginBottom: 8 }}>
                        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                            <span style={{ fontSize: 14 }}>{sb?.ikon || "📱"}</span>
                            <div>
                              <div style={{ fontWeight: 700, fontSize: 12, color: sb?.renk || "#94A3B8" }}>{sb?.baslik}</div>
                              <div style={{ fontSize: 10, color: "#475569", fontFamily: "'JetBrains Mono',monospace" }}>{sms.tarih} · {sms.saat}</div>
                            </div>
                          </div>
                          <Chip renk={sms.durum === "iletildi" ? "#10B981" : "#F59E0B"} sm>{sms.durum === "iletildi" ? "✓ İletildi" : "⏳ Bekliyor"}</Chip>
                        </div>
                        <div style={{ fontSize: 10, color: "#475569" }}>📞 {sms.alici} · {sms.n} kr</div>
                      </div>
                    );
                  })}
                </Card>
              </div>
            )}
          </div>

          {/* MOBİL BOTTOM NAV */}
          {isMobile && (
            <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: "#111827", borderTop: "1px solid rgba(255,255,255,0.08)", display: "flex", zIndex: 100, paddingBottom: "env(safe-area-inset-bottom)" }}>
              {TABS.map(t => (
                <button key={t.id} onClick={() => setTab(t.id)} style={{ flex: 1, background: "none", border: "none", padding: "8px 2px 10px", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 2, position: "relative" }}>
                  <span style={{ fontSize: 18 }}>{t.mIcon}</span>
                  <span style={{ fontSize: 8, fontWeight: tab === t.id ? 700 : 500, color: tab === t.id ? "#818CF8" : "#475569" }}>{t.label}</span>
                  {tab === t.id && <div style={{ position: "absolute", top: 0, left: "20%", right: "20%", height: 2, background: "#4F46E5", borderRadius: "0 0 2px 2px" }} />}
                  {t.badge && eksik.length > 0 && <div style={{ position: "absolute", top: 5, right: "calc(50% - 16px)", background: "#EF4444", color: "#fff", borderRadius: "50%", width: 13, height: 13, fontSize: 7, fontWeight: 800, display: "flex", alignItems: "center", justifyContent: "center" }}>{eksik.length}</div>}
                  {t.photoBadge && photos.length > 0 && <div style={{ position: "absolute", top: 5, right: "calc(50% - 20px)", background: "#3B82F6", color: "#fff", borderRadius: 3, padding: "0 3px", fontSize: 7, fontWeight: 800 }}>{photos.length}</div>}
                  {t.sms && smsAktif && <div style={{ position: "absolute", top: 7, right: "calc(50% - 18px)", width: 6, height: 6, borderRadius: "50%", background: "#4F46E5" }} />}
                </button>
              ))}
            </div>
          )}

          {/* LIGHTBOX */}
          {lightboxFoto && (
            <Lightbox
              foto={lightboxFoto}
              onClose={() => setLightboxFoto(null)}
              onPrev={() => setLightboxFoto(filtreliPhotos[lbIdx - 1])}
              onNext={() => setLightboxFoto(filtreliPhotos[lbIdx + 1])}
              hasPrev={lbIdx > 0}
              hasNext={lbIdx < filtreliPhotos.length - 1}
            />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Panel />);
  </script>
</body>
</html>
