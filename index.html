*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%}
body{background:#0D1117;color:#E2E8F0;font-family:'Inter','Segoe UI',sans-serif;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#1E293B;border-radius:2px}
button{transition:filter .15s;font-family:inherit;cursor:pointer}button:hover{filter:brightness(1.1)}
input,textarea,select{outline:none;font-family:inherit}
.toggle{position:relative;width:44px;height:24px;display:inline-block}
.toggle input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;inset:0;background:#334155;border-radius:24px;transition:.3s}
.slider:before{content:"";position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
input:checked+.slider{background:#4F46E5}
input:checked+.slider:before{transform:translateX(20px)}
.photo-card:hover{transform:scale(1.02)}.photo-card{transition:transform .2s}
.photo-card:hover .photo-overlay{opacity:1!important}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes fadeUp{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes popIn{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.edit-field{background:rgba(79,70,229,0.08)!important;border:1px solid rgba(79,70,229,0.4)!important;border-radius:7px!important}
</style>

function Chip({renk,children,sm}){
  return <span style={{fontSize:sm?9:10,fontWeight:700,padding:sm?"2px 6px":"2px 8px",borderRadius:4,background:`${renk}18`,color:renk,border:`1px solid ${renk}30`,whiteSpace:"nowrap"}}>{children}</span>;
}
function Card({children,style={}}){
  return <div style={{background:"#161B26",border:"1px solid rgba(255,255,255,0.06)",borderRadius:12,padding:16,...style}}>{children}</div>;
}
function STitle({children}){return <div style={{fontWeight:700,fontSize:13,marginBottom:14}}>{children}</div>;}

// Kaynak etiketi — acenteden mi, servisten/müşteriden mi
function KaynakChip({kaynak}){
  const map={acente:{l:"Acente",c:"#3B82F6"},servis:{l:"Servis",c:"#8B5CF6"},musteri:{l:"Müşteri",c:"#F59E0B"},eksper:{l:"Eksper",c:"#10B981"}};
  const k=map[kaynak]; if(!k) return null;
  return <span style={{fontSize:8,fontWeight:700,padding:"1px 5px",borderRadius:3,background:`${k.c}15`,color:k.c,border:`1px solid ${k.c}25`,marginLeft:4}}>{k.l}</span>;
}

// Düzenlenebilir satır bileşeni
function EditRow({label,value,onChange,kaynak,mono,placeholder,type="text",editMode,halfWidth}){
  return(
    <div style={{padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,0.04)",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:4}}>
      <div style={{display:"flex",alignItems:"center",gap:0,flexShrink:0,marginRight:8}}>
        <span style={{fontSize:12,color:"#64748B"}}>{label}</span>
        {kaynak&&<KaynakChip kaynak={kaynak}/>}
      </div>
      {editMode?(
        <input type={type} value={value||""} onChange={e=>onChange(e.target.value)} placeholder={placeholder||label} style={{fontSize:12,fontWeight:600,color:"#E2E8F0",background:"rgba(79,70,229,0.08)",border:"1px solid rgba(79,70,229,0.35)",borderRadius:6,padding:"4px 8px",fontFamily:mono?"'JetBrains Mono',monospace":"inherit",textAlign:"right",width:halfWidth?"48%":"auto",minWidth:120,maxWidth:"60%"}}/>
      ):(
        <span style={{fontSize:12,fontWeight:600,color:"#CBD5E1",fontFamily:mono?"'JetBrains Mono',monospace":"inherit",textAlign:"right"}}>{value||<span style={{color:"#334155",fontStyle:"italic"}}>—</span>}</span>
      )}
    </div>
  );
}

function CardHeader({title,editMode,onToggle,saving}){

      </button>
    </div>
  );
}

// ── FOTOĞRAF BİLEŞENLERİ ───────────────────────────────────────────────────
function DropZone({onUpload,isMobile}){
  const [dragging,setDragging]=useState(false);
  const ref=useRef();
  const handle=(files)=>Array.from(files).filter(f=>f.type.startsWith("image/")).forEach(file=>{
    const r=new FileReader();
    r.onload=e=>onUpload({id:Date.now()+Math.random(),url:e.target.result,etiket:file.name.replace(/\.[^.]+$/,""),kategori:"kaza",tarih:new Date().toLocaleDateString("tr-TR"),yukleyen:"Danışman",boyut:(file.size/1048576).toFixed(1)+" MB"});
    r.readAsDataURL(file);
  });
  return(
    <div onClick={()=>ref.current?.click()} onDragOver={e=>{e.preventDefault();setDragging(true);}} onDragLeave={()=>setDragging(false)} onDrop={e=>{e.preventDefault();setDragging(false);handle(e.dataTransfer.files);}} style={{border:`2px dashed ${dragging?"#4F46E5":"rgba(79,70,229,0.3)"}`,borderRadius:12,padding:isMobile?"20px":"28px",textAlign:"center",cursor:"pointer",background:dragging?"rgba(79,70,229,0.08)":"rgba(79,70,229,0.03)",transition:"all .2s"}}>
      <input ref={ref} type="file" accept="image/*" multiple onChange={e=>handle(e.target.files)} style={{display:"none"}}/>
      <div style={{fontSize:isMobile?32:40,marginBottom:8}}>📷</div>
      <div style={{fontWeight:700,fontSize:13,color:"#818CF8",marginBottom:4}}>Fotoğraf sürükleyin veya seçin</div>
      <div style={{fontSize:11,color:"#475569",marginBottom:12}}>JPG, PNG, WEBP</div>
      <button onClick={e=>{e.stopPropagation();ref.current?.click();}} style={{background:"#4F46E5",border:"none",color:"#fff",borderRadius:8,padding:"8px 20px",fontSize:12,fontWeight:700}}>📷 Seç</button>
    </div>
  );
}

function Lightbox({foto,onClose,onPrev,onNext,hasPrev,hasNext}){
  useEffect(()=>{
    const h=e=>{if(e.key==="Escape")onClose();if(e.key==="ArrowLeft"&&hasPrev)onPrev();if(e.key==="ArrowRight"&&hasNext)onNext();};
    window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);
  },[hasPrev,hasNext]);
  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div onClick={e=>e.stopPropagation()} style={{position:"relative",maxWidth:900,width:"100%",display:"flex",flexDirection:"column",gap:12}}>
        <button onClick={onClose} style={{position:"absolute",top:-44,right:0,background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.15)",color:"#fff",borderRadius:"50%",width:34,height:34,fontSize:20,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
        <div style={{position:"relative",borderRadius:12,overflow:"hidden",background:"#0D1117"}}>
          <img src={foto.url} alt={foto.etiket} style={{width:"100%",maxHeight:"70vh",objectFit:"contain",display:"block"}}/>
          {hasPrev&&<button onClick={onPrev} style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",background:"rgba(0,0,0,0.6)",border:"1px solid rgba(255,255,255,0.15)",color:"#fff",borderRadius:"50%",width:40,height:40,fontSize:22,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>}
          {hasNext&&<button onClick={onNext} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"rgba(0,0,0,0.6)",border:"1px solid rgba(255,255,255,0.15)",color:"#fff",borderRadius:"50%",width:40,height:40,fontSize:22,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>}
        </div>
        <div style={{background:"#161B26",border:"1px solid rgba(255,255,255,0.08)",borderRadius:10,padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
          <div><div style={{fontWeight:700,fontSize:14}}>{foto.etiket}</div><div style={{fontSize:12,color:"#64748B",marginTop:2}}>{foto.tarih} · {foto.yukleyen} · {foto.boyut}</div></div>
          <a href={foto.url} download={`${foto.etiket}.jpg`} style={{background:"rgba(79,70,229,0.15)",border:"1px solid rgba(79,70,229,0.3)",color:"#818CF8",borderRadius:6,padding:"5px 13px",fontSize:11,fontWeight:700,textDecoration:"none"}}>⬇ İndir</a>
        </div>
      </div>
    </div>
  );
}

// ── YENİ DOSYA SİHİRBAZI ────────────────────────────────────────────────────
function YeniDosyaWizard({onKapat,onKaydet}){
  const [adim,setAdim]=useState(1);
  const [ruhsatImg,setRuhsatImg]=useState(null);
  const [tarama,setTarama]=useState(false);
  const [taramaOk,setTaramaOk]=useState(false);
  const [taramaHata,setTaramaHata]=useState(false);
  const [belgeler,setBelgeler]=useState([]);
  const [fotoğraflar,setFotograflar]=useState([]);
  const [kayitOk,setKayitOk]=useState(false);
  const ruhsatRef=useRef();
  const belgeRef=useRef();
  const fotoRef=useRef();
  const [isMobile,setIsMobile]=useState(false);
  useEffect(()=>{const c=()=>setIsMobile(window.innerWidth<768);c();window.addEventListener("resize",c);return()=>window.removeEventListener("resize",c);},[]);

  const [form,setForm]=useState({
    plaka:"",saseNo:"",motorNo:"",marka:"",model:"",yil:"",ruhsatSeriNo:"",renk:"",
    sahipAd:"",tc:"",telefon:"",email:"",
    acente:"",sigortaSirketi:"",bransi:"",muallakHasar:"",policeNo:"",hasarNo:"",teminat:"",muafiyet:"",
    kazaTarihi:"",kazaAciklama:"",
  });
  const sf=(k,v)=>setForm(p=>({...p,[k]:v}));

  const ruhsatTara=async()=>{
    if(!ruhsatImg)return;
    setTarama(true);setTaramaHata(false);setTaramaOk(false);
    try{
      const resp=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:800,
          messages:[{
            role:"user",
            content:[
              {type:"image",source:{type:"base64",media_type:"image/jpeg",data:ruhsatImg.split(",")[1]}},
              {type:"text",text:'Bu bir Türk araç tescil belgesi (ruhsat) veya benzer bir araç belgesidir. Belgedeki bilgileri tespit ederek aşağıdaki JSON formatında döndür. Bulunamayan alanlar için boş string kullan. Sadece JSON döndür, başka hiçbir şey yazma:\n{"plaka":"","saseNo":"","motorNo":"","marka":"","model":"","yil":"","ruhsatSeriNo":"","sahipAd":"","renk":""}'}
            ]
          }]
        })
      });
      const data=await resp.json();
      const text=data.content?.find(b=>b.type==="text")?.text||"";
      const clean=text.replace(/```json|```/g,"").trim();
      const parsed=JSON.parse(clean);
      setForm(p=>({...p,
        plaka:parsed.plaka||p.plaka,saseNo:parsed.saseNo||p.saseNo,motorNo:parsed.motorNo||p.motorNo,
        marka:parsed.marka||p.marka,model:parsed.model||p.model,yil:parsed.yil||p.yil,
        ruhsatSeriNo:parsed.ruhsatSeriNo||p.ruhsatSeriNo,sahipAd:parsed.sahipAd||p.sahipAd,renk:parsed.renk||p.renk,
      }));
      setTaramaOk(true);
    }catch(e){setTaramaHata(true);}
    finally{setTarama(false);}
  };

  const handleRuhsat=(files)=>{
    const f=files[0];if(!f)return;
    const r=new FileReader();
    r.onload=e=>{setRuhsatImg(e.target.result);setTaramaOk(false);};
    r.readAsDataURL(f);
  };

  const handleBelge=(files)=>{
    Array.from(files).forEach(f=>{
      const r=new FileReader();
      r.onload=e=>setBelgeler(p=>[...p,{id:Date.now()+Math.random(),ad:f.name,url:e.target.result,boyut:(f.size/1048576).toFixed(1)+" MB",tip:"belge"}]);
      r.readAsDataURL(f);
    });
  };

  const handleFoto=(files)=>{
    Array.from(files).filter(f=>f.type.startsWith("image/")).forEach(f=>{
      const r=new FileReader();
      r.onload=e=>setFotograflar(p=>[...p,{id:Date.now()+Math.random(),url:e.target.result,etiket:f.name.replace(/\.[^.]+$/,""),kategori:"kaza",tarih:new Date().toLocaleDateString("tr-TR"),yukleyen:"Danışman",boyut:(f.size/1048576).toFixed(1)+" MB"}]);
      r.readAsDataURL(f);
    });
  };

  const kaydet=()=>{
    setKayitOk(true);
    setTimeout(()=>{
      onKaydet({form,belgeler,fotograflar:fotoğraflar});
      onKapat();
    },1500);
  };

  const ADIMLAR=[
    {n:1,label:"Ruhsat",ikon:"📄"},
    {n:2,label:"Araç & Müşteri",ikon:"🚗"},
    {n:3,label:"Sigorta & Kaza",ikon:"🏦"},
    {n:4,label:"Belgeler",ikon:"📎"},
    {n:5,label:"Özet",ikon:"✅"},
  ];

  const inputSt={width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:9,color:"#E2E8F0",padding:"11px 13px",fontSize:13};
  const labelSt={fontSize:11,color:"#64748B",fontWeight:600,marginBottom:6,display:"block"};
  const gridSt={display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",gap:14};

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:200,display:"flex",alignItems:"flex-start",justifyContent:"center",padding:isMobile?"0":"24px",overflowY:"auto"}}>
      <div style={{background:"#0D1117",border:"1px solid rgba(255,255,255,0.1)",borderRadius:isMobile?0:16,width:"100%",maxWidth:680,minHeight:isMobile?"100vh":"auto",display:"flex",flexDirection:"column",animation:"popIn .25s ease"}}>

        {/* Header */}
        <div style={{background:"#111827",borderBottom:"1px solid rgba(255,255,255,0.07)",borderRadius:isMobile?"0":"16px 16px 0 0",padding:"16px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:10}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:34,height:34,borderRadius:8,background:"linear-gradient(135deg,#1E40AF,#4F46E5)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>📁</div>
            <div><div style={{fontWeight:800,fontSize:15}}>Yeni Hasar Dosyası</div><div style={{fontSize:11,color:"#475569"}}>Adım {adim} / 5</div></div>
          </div>
          <button onClick={onKapat} style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",color:"#94A3B8",borderRadius:"50%",width:32,height:32,fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
        </div>

        {/* Adım göstergesi */}
        <div style={{padding:"14px 20px",background:"#111827",borderBottom:"1px solid rgba(255,255,255,0.05)",display:"flex",gap:4}}>
          {ADIMLAR.map(a=>(
            <div key={a.n} onClick={()=>a.n<adim&&setAdim(a.n)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:5,cursor:a.n<adim?"pointer":"default"}}>
              <div style={{width:"100%",height:3,borderRadius:2,background:adim>=a.n?"#4F46E5":"rgba(255,255,255,0.08)",transition:"background .3s"}}/>
              <div style={{fontSize:9,color:adim===a.n?"#818CF8":adim>a.n?"#10B981":"#334155",fontWeight:adim===a.n?700:500,textAlign:"center",whiteSpace:"nowrap"}}>{a.n===adim||!isMobile?`${a.ikon} ${a.label}`:a.ikon}</div>
            </div>
          ))}
        </div>

        {/* İçerik */}
        <div style={{flex:1,overflow:"auto",padding:20}}>

          {/* ── ADIM 1: RUHSAT TARAMA ── */}
          {adim===1&&(
            <div style={{display:"flex",flexDirection:"column",gap:16}}>
              <div style={{padding:"12px 16px",background:"rgba(79,70,229,0.07)",border:"1px solid rgba(79,70,229,0.2)",borderRadius:10,fontSize:13,color:"#94A3B8",lineHeight:1.7}}>
                🤖 <strong style={{color:"#818CF8"}}>AI Ruhsat Taraması</strong> — Araç tescil belgesinin fotoğrafını yükleyin. Claude yapay zeka motoru, belgedeki plaka, şase no, motor no, marka/model gibi bilgileri otomatik olarak okuyup forma aktaracak.
              </div>

              {/* Ruhsat yükleme alanı */}
              <div onClick={()=>ruhsatRef.current?.click()} onDragOver={e=>{e.preventDefault();}} onDrop={e=>{e.preventDefault();handleRuhsat(e.dataTransfer.files);}} style={{border:`2px dashed ${ruhsatImg?"rgba(79,70,229,0.5)":"rgba(255,255,255,0.15)"}`,borderRadius:12,padding:ruhsatImg?"0":"32px",textAlign:"center",cursor:"pointer",background:ruhsatImg?"#0D1117":"rgba(255,255,255,0.02)",position:"relative",overflow:"hidden",minHeight:180}}>
                <input ref={ruhsatRef} type="file" accept="image/*" onChange={e=>handleRuhsat(e.target.files)} style={{display:"none"}}/>
                {ruhsatImg?(
                  <div>
                    <img src={ruhsatImg} alt="Ruhsat" style={{width:"100%",maxHeight:260,objectFit:"contain",display:"block",borderRadius:10}}/>
                    <div style={{position:"absolute",top:8,right:8,display:"flex",gap:6}}>
                      <button onClick={e=>{e.stopPropagation();setRuhsatImg(null);setTaramaOk(false);}} style={{background:"rgba(239,68,68,0.85)",border:"none",color:"#fff",borderRadius:6,padding:"4px 10px",fontSize:11,fontWeight:700}}>✕ Kaldır</button>
                    </div>
                    {taramaOk&&<div style={{position:"absolute",top:8,left:8,background:"rgba(16,185,129,0.9)",color:"#fff",borderRadius:6,padding:"4px 10px",fontSize:11,fontWeight:700}}>✓ Veriler çekildi</div>}
                  </div>
                ):(
                  <div>
                    <div style={{fontSize:48,marginBottom:12}}>📄</div>
                    <div style={{fontWeight:700,fontSize:14,color:"#818CF8",marginBottom:6}}>Ruhsat fotoğrafını buraya sürükleyin</div>
                    <div style={{fontSize:12,color:"#475569",marginBottom:16}}>veya tıklayarak seçin · JPG, PNG</div>
                    <button style={{background:"rgba(79,70,229,0.2)",border:"1px solid rgba(79,70,229,0.4)",color:"#818CF8",borderRadius:9,padding:"10px 20px",fontSize:13,fontWeight:700}}>📷 Fotoğraf Seç</button>
                  </div>
                )}
              </div>

              {ruhsatImg&&!taramaOk&&(
                <button onClick={ruhsatTara} disabled={tarama} style={{background:tarama?"rgba(79,70,229,0.4)":"#4F46E5",border:"none",color:"#fff",borderRadius:10,padding:"14px",fontSize:14,fontWeight:800,cursor:tarama?"not-allowed":"pointer"}}>
                  {tarama?(
                    <span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
                      <span style={{width:18,height:18,border:"2px solid rgba(255,255,255,0.3)",borderTop:"2px solid #fff",borderRadius:"50%",display:"inline-block",animation:"spin .7s linear infinite"}}/>
                      Claude verileri okuyor...
                    </span>
                  ):"🤖 Verileri Otomatik Çek"}
                </button>
              )}

              {taramaHata&&(
                <div style={{padding:"11px 14px",background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.25)",borderRadius:9,fontSize:12,color:"#EF4444"}}>
                  ⚠ Belge okunamadı. Lütfen daha net bir fotoğraf deneyin veya verileri elle girin.
                </div>
              )}

              {taramaOk&&(
                <div style={{padding:"12px 16px",background:"rgba(16,185,129,0.07)",border:"1px solid rgba(16,185,129,0.25)",borderRadius:10}}>
                  <div style={{fontWeight:700,fontSize:13,color:"#10B981",marginBottom:10}}>✓ Otomatik Çekilen Veriler</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                    {[["Plaka",form.plaka],["Marka",form.marka],["Model",form.model],["Yıl",form.yil],["Şase No",form.saseNo],["Motor No",form.motorNo],["Ruhsat Seri No",form.ruhsatSeriNo],["Renk",form.renk]].filter(r=>r[1]).map(r=>(
                      <div key={r[0]} style={{background:"rgba(255,255,255,0.03)",borderRadius:7,padding:"7px 10px"}}>
                        <div style={{fontSize:9,color:"#475569",fontWeight:600}}>{r[0]}</div>
                        <div style={{fontSize:12,fontWeight:600,color:"#CBD5E1",fontFamily:["Plaka","Şase No","Motor No","Ruhsat Seri No"].includes(r[0])?"'JetBrains Mono',monospace":"inherit"}}>{r[1]}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{fontSize:11,color:"#64748B",marginTop:10}}>Sonraki adımda tüm alanları kontrol edip düzenleyebilirsiniz.</div>
                </div>
              )}

              <div style={{padding:"10px 14px",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:9,fontSize:11,color:"#475569",textAlign:"center"}}>
                Ruhsat yoksa veya taramayı atlamak istiyorsanız → <button onClick={()=>setAdim(2)} style={{background:"none",border:"none",color:"#818CF8",fontSize:11,cursor:"pointer",textDecoration:"underline"}}>Verileri Elle Gir</button>
              </div>
            </div>
          )}

          {/* ── ADIM 2: ARAÇ & MÜŞTERİ ── */}
          {adim===2&&(
            <div style={{display:"flex",flexDirection:"column",gap:20}}>
              <div>
                <div style={{fontWeight:700,fontSize:13,marginBottom:14,display:"flex",alignItems:"center",gap:8}}>🚗 Araç Bilgileri {taramaOk&&<span style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:4,background:"rgba(16,185,129,0.15)",color:"#10B981",border:"1px solid rgba(16,185,129,0.25)"}}>✓ Ruhsattan aktarıldı</span>}</div>
                <div style={gridSt}>
                  {[["Plaka","plaka","34 ABC 123",true],["Ruhsat Seri No","ruhsatSeriNo","AA123456",true],["Şase No","saseNo","JTDXXXXXXXXXXXXXXX",true],["Motor No","motorNo","1NZ-XXXXXXX",true],["Marka","marka","Toyota",false],["Model","model","Corolla 1.6",false],["Model Yılı","yil","2021",false],["Renk","renk","Sedef Beyaz",false]].map(([l,k,p,mono])=>(
                    <div key={k}><label style={labelSt}>{l}</label><input type="text" value={form[k]} onChange={e=>sf(k,e.target.value)} placeholder={p} style={{...inputSt,fontFamily:mono?"'JetBrains Mono',monospace":"inherit"}}/></div>
                  ))}
                </div>
              </div>
              <div style={{borderTop:"1px solid rgba(255,255,255,0.06)",paddingTop:20}}>
                <div style={{fontWeight:700,fontSize:13,marginBottom:14}}>👤 Araç Sahibi / Müşteri</div>
                <div style={gridSt}>
                  {[["Ad Soyad","sahipAd","Mehmet Yılmaz",false],["TC Kimlik No","tc","12345678901",true],["Telefon","telefon","0532 123 45 67",true],["E-posta","email","eposta@...",false]].map(([l,k,p,mono])=>(
                    <div key={k}><label style={labelSt}>{l}</label><input type="text" value={form[k]} onChange={e=>sf(k,e.target.value)} placeholder={p} style={{...inputSt,fontFamily:mono?"'JetBrains Mono',monospace":"inherit"}}/></div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* ── ADIM 3: SİGORTA & KAZA ── */}
          {adim===3&&(
            <div style={{display:"flex",flexDirection:"column",gap:20}}>
              <div>
                <div style={{fontWeight:700,fontSize:13,marginBottom:14}}>🏦 Sigorta Bilgileri</div>
                <div style={gridSt}>
                  {[["Yönlendiren Acente","acente","ABC Sigorta Acentesi",false],["Sigorta Şirketi","sigortaSirketi","AXA Sigorta A.Ş.",false],["Sigorta Branşı","bransi","Kasko",false],["Muallak Hasar Tutarı","muallakHasar","28.500 ₺",false],["Poliçe No","policeNo","POL-2024-XXXXX",true],["Hasar No","hasarNo","HAK-2024-XXXXX",true],["Teminat Türü","teminat","Kasko (Tam)",false],["Muafiyet","muafiyet","2.500 ₺",false]].map(([l,k,p,mono])=>(
                    <div key={k}><label style={labelSt}>{l}</label><input type="text" value={form[k]} onChange={e=>sf(k,e.target.value)} placeholder={p} style={{...inputSt,fontFamily:mono?"'JetBrains Mono',monospace":"inherit"}}/></div>
                  ))}
                </div>
              </div>
              <div style={{borderTop:"1px solid rgba(255,255,255,0.06)",paddingTop:20}}>
                <div style={{fontWeight:700,fontSize:13,marginBottom:14}}>🚨 Kaza Bilgileri</div>
                <div style={{marginBottom:14}}><label style={labelSt}>Kaza Tarihi</label><input type="text" value={form.kazaTarihi} onChange={e=>sf("kazaTarihi",e.target.value)} placeholder="GG.AA.YYYY" style={inputSt}/></div>
                <div><label style={labelSt}>Kaza Açıklaması</label><textarea value={form.kazaAciklama} onChange={e=>sf("kazaAciklama",e.target.value)} rows={4} placeholder="Kazanın nasıl gerçekleştiğini açıklayın..." style={{...inputSt,resize:"none",lineHeight:1.6}}/></div>
              </div>
            </div>
          )}

          {/* ── ADIM 4: BELGELER & FOTOĞRAFLAR ── */}
          {adim===4&&(
            <div style={{display:"flex",flexDirection:"column",gap:20}}>
              {/* Belgeler */}
              <div>
                <div style={{fontWeight:700,fontSize:13,marginBottom:14}}>📎 Belgeler</div>
                <div style={{fontSize:12,color:"#64748B",marginBottom:12}}>Kaza tespit tutanağı, ehliyet, ruhsat fotokopisi vb.</div>
                <div onClick={()=>belgeRef.current?.click()} style={{border:"2px dashed rgba(79,70,229,0.3)",borderRadius:10,padding:"20px",textAlign:"center",cursor:"pointer",background:"rgba(79,70,229,0.03)",marginBottom:12}}>
                  <input ref={belgeRef} type="file" multiple accept=".pdf,.jpg,.jpeg,.png" onChange={e=>handleBelge(e.target.files)} style={{display:"none"}}/>
                  <div style={{fontSize:28,marginBottom:8}}>📂</div>
                  <div style={{fontWeight:600,fontSize:13,color:"#818CF8",marginBottom:4}}>Belge yükle</div>
                  <div style={{fontSize:11,color:"#475569"}}>PDF, JPG, PNG</div>
                </div>
                {belgeler.length>0&&(
                  <div style={{display:"flex",flexDirection:"column",gap:6}}>
                    {belgeler.map(b=>(
                      <div key={b.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:8}}>
                        <span style={{fontSize:16}}>📄</span>
                        <div style={{flex:1,minWidth:0}}><div style={{fontSize:12,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{b.ad}</div><div style={{fontSize:10,color:"#64748B"}}>{b.boyut}</div></div>
                        <button onClick={()=>setBelgeler(p=>p.filter(x=>x.id!==b.id))} style={{background:"none",border:"none",color:"#EF4444",fontSize:16,cursor:"pointer"}}>×</button>
                      </div>
                    ))}
                  </div>
                )}
              </div>

              {/* Fotoğraflar */}
              <div style={{borderTop:"1px solid rgba(255,255,255,0.06)",paddingTop:20}}>
                <div style={{fontWeight:700,fontSize:13,marginBottom:14}}>📷 Hasar Fotoğrafları</div>
                <div onClick={()=>fotoRef.current?.click()} style={{border:"2px dashed rgba(139,92,246,0.3)",borderRadius:10,padding:"20px",textAlign:"center",cursor:"pointer",background:"rgba(139,92,246,0.03)",marginBottom:12}}>
                  <input ref={fotoRef} type="file" multiple accept="image/*" onChange={e=>handleFoto(e.target.files)} style={{display:"none"}}/>
                  <div style={{fontSize:28,marginBottom:8}}>🖼️</div>
                  <div style={{fontWeight:600,fontSize:13,color:"#A78BFA",marginBottom:4}}>Fotoğraf yükle</div>
                  <div style={{fontSize:11,color:"#475569"}}>JPG, PNG, WEBP · Birden fazla seçilebilir</div>
                </div>
                {fotoğraflar.length>0&&(

function MusteriGiris({onGiris,onGeri}){
  const [adim,setAdim]=useState("tc");const [tc,setTc]=useState("");const [smsKod,setSmsKod]=useState("");const [hata,setHata]=useState("");const [yukleniyor,setYukleniyor]=useState(false);const [sayac,setSayac]=useState(0);
  useEffect(()=>{if(sayac>0){const t=setTimeout(()=>setSayac(s=>s-1),1000);return()=>clearTimeout(t);};},[sayac]);
  const tcGonder=()=>{
    if(tc.replace(/\s/g,"").length<11){setHata("TC 11 haneli olmalıdır.");return;}
    if(tc.replace(/\s/g,"")!==DEMO.sahip.tc.replace(/\s/g,"")){setHata("Bu TC numarasına kayıt bulunamadı.");return;}
    setYukleniyor(true);setHata("");setTimeout(()=>{setYukleniyor(false);setAdim("sms");setSayac(60);},1000);
  };
  const smsDogrula=()=>{
    if(smsKod.length<4){setHata("4 haneli kodu girin.");return;}
    setYukleniyor(true);setHata("");
    setTimeout(()=>{setYukleniyor(false);if(smsKod==="1234")onGiris();else{setHata("Kod hatalı. Demo kod: 1234");setSmsKod("");}},800);
  };
  const maskTel=DEMO.sahip.telefon.replace(/(\d{4})\s(\d{3})\s(\d{2})\s(\d{2})/,(m,a,b,c,d)=>`${a} *** ** ${d}`);
  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:24,background:"#0D1117"}}>
      <div style={{width:"100%",maxWidth:380,animation:"popIn .3s ease"}}>

          <div style={{fontWeight:800,fontSize:20}}>Sigortalı Girişi</div>
        </div>
        <div style={{display:"flex",gap:8,marginBottom:28}}>
          {["TC Kimlik","SMS Doğrulama"].map((s,i)=>(
            <div key={i} style={{flex:1,textAlign:"center"}}>
              <div style={{height:3,borderRadius:2,background:(adim==="tc"&&i===0)||(adim==="sms"&&i<=1)?"#F59E0B":"rgba(255,255,255,0.1)",marginBottom:6}}/>
              <div style={{fontSize:10,color:(adim==="tc"&&i===0)||(adim==="sms"&&i<=1)?"#F59E0B":"#475569",fontWeight:600}}>{s}</div>
            </div>
          ))}
        </div>
        {adim==="tc"&&(
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div><div style={{fontSize:11,color:"#64748B",fontWeight:600,marginBottom:6}}>TC KİMLİK NUMARASI</div>
            <input type="tel" value={tc} onChange={e=>setTc(e.target.value.replace(/\D/g,"").slice(0,11))} onKeyDown={e=>e.key==="Enter"&&tcGonder()} placeholder="12345678901" maxLength={11} style={{width:"100%",background:"rgba(255,255,255,0.05)",border:`1px solid ${hata?"rgba(239,68,68,0.5)":"rgba(255,255,255,0.1)"}`,borderRadius:10,color:"#E2E8F0",padding:"12px 14px",fontSize:16,letterSpacing:"2px",fontFamily:"'JetBrains Mono',monospace"}}/>
            {hata&&<div style={{fontSize:11,color:"#EF4444",marginTop:6}}>⚠ {hata}</div>}</div>
            <button onClick={tcGonder} disabled={yukleniyor} style={{background:"#F59E0B",border:"none",color:"#000",borderRadius:10,padding:14,fontSize:14,fontWeight:800}}>
              {yukleniyor?<span style={{animation:"pulse .8s infinite"}}>Gönderiliyor...</span>:"SMS Kodu Gönder →"}
            </button>
          </div>
        )}
        {adim==="sms"&&(
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{padding:14,background:"rgba(245,158,11,0.08)",border:"1px solid rgba(245,158,11,0.2)",borderRadius:10,fontSize:13,color:"#94A3B8",textAlign:"center"}}>
              📱 <strong style={{color:"#F59E0B"}}>{maskTel}</strong> numarasına SMS kodu gönderildi
            </div>
            <div><div style={{fontSize:11,color:"#64748B",fontWeight:600,marginBottom:6}}>4 HANELİ KOD</div>
            <input type="tel" value={smsKod} onChange={e=>setSmsKod(e.target.value.replace(/\D/g,"").slice(0,4))} onKeyDown={e=>e.key==="Enter"&&smsDogrula()} placeholder="· · · ·" maxLength={4} style={{width:"100%",background:"rgba(255,255,255,0.05)",border:`1px solid ${hata?"rgba(239,68,68,0.5)":"rgba(255,255,255,0.1)"}`,borderRadius:10,color:"#E2E8F0",padding:14,fontSize:28,letterSpacing:12,textAlign:"center",fontFamily:"'JetBrains Mono',monospace"}}/>
            {hata&&<div style={{fontSize:11,color:"#EF4444",marginTop:6,textAlign:"center"}}>⚠ {hata}</div>}</div>
            <button onClick={smsDogrula} disabled={yukleniyor||smsKod.length<4} style={{background:smsKod.length===4?"#F59E0B":"rgba(245,158,11,0.3)",border:"none",color:smsKod.length===4?"#000":"#64748B",borderRadius:10,padding:14,fontSize:14,fontWeight:800}}>
              {yukleniyor?<span style={{animation:"pulse .8s infinite"}}>Doğrulanıyor...</span>:"Giriş Yap →"}
            </button>
            <div style={{textAlign:"center",fontSize:12,color:"#475569"}}>
              {sayac>0?<span>Yeniden gönder: <strong style={{color:"#F59E0B"}}>{sayac}s</strong></span>:<button onClick={()=>setSayac(60)} style={{background:"none",border:"none",color:"#F59E0B",fontSize:12,textDecoration:"underline"}}>Kodu tekrar gönder</button>}
            </div>
          </div>
        )}
        <div style={{marginTop:20,padding:"12px 14px",background:"rgba(245,158,11,0.08)",border:"1px solid rgba(245,158,11,0.2)",borderRadius:8,fontSize:11,color:"#F59E0B"}}>
          💡 Demo TC: <strong>12345678901</strong> · SMS: <strong>1234</strong>
        </div>
      </div>
    </div>
  );
}

  const [mesajlar,setMesajlar]=useState(MESAJLAR_DEMO);

  const [tab,setTab]=useState("ozet");
  const [isMobile,setIsMobile]=useState(false);

  // Edit mode per kart: "dosya"|"sahip"|"sigorta"|"onarimMerkezi"|"eksper"|"adim-N" vb.
  const [editMode,setEditMode]=useState(null);
  const [wizardAcik,setWizardAcik]=useState(false);
  const [saving,setSaving]=useState(null);

  // Fotoğraf
  const [photos,setPhotos]=useState(DEMO_PHOTOS);
  const [aktifKat,setAktifKat]=useState("tumu");
  const [lightboxFoto,setLightboxFoto]=useState(null);
  const [silOnayi,setSilOnayi]=useState(null);
  const [etiketDuzenle,setEtiketDuzenle]=useState(null);
  const [yeniEtiket,setYeniEtiket]=useState("");

  // SMS
  const [smsAktif,setSmsAktif]=useState(true);
  const [smsSaati,setSmsSaati]=useState("10:00");
  const [smsModu,setSmsModu]=useState("otomatik");
  const [ozelMesaj,setOzelMesaj]=useState("");
  const [smsMesajlar,setSmsMesajlar]=useState(GECMIS_SMS);
  const [smsGon,setSmsGon]=useState(false);
  const [smsOk,setSmsOk]=useState(false);
  const [toast,setToast]=useState(null); // {adim, mesaj, telefon}

  // İletişim
  const [hedef,setHedef]=useState("Eksper");
  const [mesajMetin,setMesajMetin]=useState("");

  useEffect(()=>{const c=()=>setIsMobile(window.innerWidth<768);c();window.addEventListener("resize",c);return()=>window.removeEventListener("resize",c);},[]);

  const eksikEvrak=evrak.filter(e=>e.durum==="eksik");
  const tamamEvrak=evrak.filter(e=>e.durum==="tamam").length;
  const oP=Math.round((adimlar.filter(a=>a.durum==="tamamlandi").length/adimlar.length)*100);
  const eP=Math.round((tamamEvrak/evrak.length)*100);
  const aktifAdim=adimlar.find(a=>a.durum==="aktif");
  const otomSms=SMS_SABLONLARI[aktifAdim?.ad]?.mesaj(dosya)||"";
  const onizSms=smsModu==="ozel"?ozelMesaj:otomSms;
  const filtrePhotos=aktifKat==="tumu"?photos:photos.filter(p=>p.kategori===aktifKat);
  const lbIdx=lightboxFoto?filtrePhotos.findIndex(p=>p.id===lightboxFoto.id):-1;

  // Dosya alanı güncelle
  const set=(yol,val)=>{
    setDosya(prev=>{
      const next={...prev};
      const parcalar=yol.split(".");
      let obj=next;
      for(let i=0;i<parcalar.length-1;i++){obj[parcalar[i]]={...obj[parcalar[i]]};obj=obj[parcalar[i]];}
      obj[parcalar[parcalar.length-1]]=val;
      return next;
    });
  };

  const kaydet=(id)=>{setSaving(id);setTimeout(()=>{setSaving(null);setEditMode(null);},1200);};

  const adimTamamla=(id)=>{
    let tamamlananAd="";
    setAdimlar(prev=>{
      const idx=prev.findIndex(a=>a.id===id);
      if(idx===-1) return prev;
      tamamlananAd=prev[idx].ad;
      const next=[...prev];

      if(idx+1<next.length) next[idx+1]={...next[idx+1],durum:"aktif"};
      return next;
    });

        setTimeout(()=>setToast(null),5000);
      }
    },100);

                <div style={{fontSize:11,color:"#64748B",fontWeight:600,marginBottom:10}}>GÖNDERIM SAATİ</div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  {["08:00","09:00","10:00","11:00","14:00","17:00"].map(s=>(
                    <button key={s} onClick={()=>setSmsSaati(s)} style={{padding:"8px 14px",borderRadius:7,border:"none",background:smsSaati===s?"rgba(79,70,229,0.25)":"rgba(255,255,255,0.04)",color:smsSaati===s?"#818CF8":"#64748B",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace",borderWidth:1,borderStyle:"solid",borderColor:smsSaati===s?"rgba(79,70,229,0.4)":"rgba(255,255,255,0.08)"}}>{s}</button>
                  ))}
                </div>
              </div>
              <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:8,padding:12,fontSize:12,color:"#94A3B8",lineHeight:1.7,marginBottom:14}}>{otomSms}</div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={smsGonder} disabled={smsGon||!smsAktif} style={{flex:1,background:smsOk?"#10B981":smsGon?"rgba(79,70,229,0.4)":"#4F46E5",border:"none",color:"#fff",borderRadius:9,padding:13,fontSize:13,fontWeight:700,cursor:smsGon||!smsAktif?"not-allowed":"pointer"}}>
                  {smsGon?<span style={{animation:"pulse .8s infinite"}}>⏳ Gönderiliyor...</span>:smsOk?"✓ İletildi!":"📤 Şimdi Gönder"}
                </button>
              </div>
            </Card>
            <Card>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                <div style={{fontWeight:700,fontSize:13}}>📜 SMS Geçmişi</div>
                <Chip renk="#4F46E5">{smsMesajlar.filter(m=>m.durum==="iletildi").length} iletildi</Chip>
              </div>
              {smsMesajlar.map(sms=>{const sb=SMS_SABLONLARI[sms.sablon];return(
                <div key={sms.id} style={{padding:"11px 13px",background:sms.durum==="iletildi"?"rgba(16,185,129,0.04)":"rgba(245,158,11,0.05)",border:`1px solid ${sms.durum==="iletildi"?"rgba(16,185,129,0.15)":"rgba(245,158,11,0.2)"}`,borderRadius:9,marginBottom:8}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                    <div style={{display:"flex",gap:8,alignItems:"center"}}><span style={{fontSize:14}}>{sb?.ikon||"📱"}</span><div><div style={{fontWeight:700,fontSize:12,color:sb?.renk||"#94A3B8"}}>{sb?.baslik||sms.sablon}</div><div style={{fontSize:10,color:"#475569",fontFamily:"'JetBrains Mono',monospace"}}>{sms.tarih} · {sms.saat}</div></div></div>
                    <Chip renk={sms.durum==="iletildi"?"#10B981":"#F59E0B"} sm>{sms.durum==="iletildi"?"✓ İletildi":"⏳ Bekliyor"}</Chip>
                  </div>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <div style={{fontSize:10,color:"#475569"}}>📞 {sms.alici} · {sms.n} kr</div>
                    {sms.otoTetik&&<span style={{fontSize:9,fontWeight:700,padding:"1px 5px",borderRadius:3,background:"rgba(16,185,129,0.12)",color:"#10B981",border:"1px solid rgba(16,185,129,0.2)"}}>⚡ Otomatik</span>}
                  </div>
                </div>
              );})}
            </Card>
          </div>
        )}
      </div>

      {/* MOBİL NAV */}
      {isMobile&&(
        <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#111827",borderTop:"1px solid rgba(255,255,255,0.08)",display:"flex",zIndex:100,paddingBottom:"env(safe-area-inset-bottom)"}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:"none",border:"none",padding:"8px 2px 10px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,position:"relative"}}>
              <span style={{fontSize:18}}>{t.mIcon}</span>
              <span style={{fontSize:8,fontWeight:tab===t.id?700:500,color:tab===t.id?"#818CF8":"#475569"}}>{t.label}</span>
              {tab===t.id&&<div style={{position:"absolute",top:0,left:"20%",right:"20%",height:2,background:"#4F46E5",borderRadius:"0 0 2px 2px"}}/>}
              {t.badge&&eksikEvrak.length>0&&<div style={{position:"absolute",top:5,right:"calc(50% - 16px)",background:"#EF4444",color:"#fff",borderRadius:"50%",width:13,height:13,fontSize:7,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center"}}>{eksikEvrak.length}</div>}
              {t.photoBadge&&photos.length>0&&<div style={{position:"absolute",top:5,right:"calc(50% - 20px)",background:"#3B82F6",color:"#fff",borderRadius:3,padding:"0 3px",fontSize:7,fontWeight:800}}>{photos.length}</div>}
            </button>
          ))}
        </div>
      )}

      <SmsToast toast={toast} onKapat={()=>setToast(null)}/>
      {wizardAcik&&<YeniDosyaWizard onKapat={()=>setWizardAcik(false)} onKaydet={(data)=>{console.log("Yeni dosya kaydedildi",data);}}/>}

      {lightboxFoto&&(
        <Lightbox foto={lightboxFoto} onClose={()=>setLightboxFoto(null)} onPrev={()=>setLightboxFoto(filtrePhotos[lbIdx-1])} onNext={()=>setLightboxFoto(filtrePhotos[lbIdx+1])} hasPrev={lbIdx>0} hasNext={lbIdx<filtrePhotos.length-1}/>
      )}
    </div>
  );
}

// ── ANA ROUTER ──────────────────────────────────────────────────────────────
function App(){
  const [ekran,setEkran]=useState("rolsecim");
  return(
    <>
      {ekran==="rolsecim"&&<RolSecim onRol={r=>setEkran(`${r}-giris`)}/>}
      {ekran==="danisman-giris"&&<DanismanGiris onGiris={()=>setEkran("danisman")} onGeri={()=>setEkran("rolsecim")}/>}
      {ekran==="acente-giris"&&<AcenteGiris onGiris={()=>setEkran("acente")} onGeri={()=>setEkran("rolsecim")}/>}
      {ekran==="musteri-giris"&&<MusteriGiris onGiris={()=>setEkran("musteri")} onGeri={()=>setEkran("rolsecim")}/>}
      {ekran==="danisman"&&<DanismanPanel onCikis={()=>setEkran("rolsecim")}/>}
      {ekran==="acente"&&<AcentePanel onCikis={()=>setEkran("rolsecim")}/>}
      {ekran==="musteri"&&<MusteriPanel onCikis={()=>setEkran("rolsecim")}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
